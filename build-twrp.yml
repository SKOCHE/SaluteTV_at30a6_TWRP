name: SaluteTV TWRP Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'TWRP Manifest URL'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'
      MANIFEST_BRANCH:
        description: 'TWRP Branch (Android 13)'
        required: true
        default: 'twrp-13'
      DEVICE_TREE_URL:
        description: 'Device Tree URL'
        required: true
        default: 'https://github.com/SKOCHE/SaluteTV_at30a6_TWRP'
      DEVICE_TREE_BRANCH:
        description: 'Device Tree Branch'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'Device Path in source'
        required: true
        default: 'device/salute/at30a6'
      DEVICE_NAME:
        description: 'Device Codename'
        required: true
        default: 'at30a6'
      MAKEFILE_NAME:
        description: 'Makefile Name'
        required: true
        default: 'twrp_at30a6'
      BUILD_TARGET:
        description: 'Build Target'
        required: true
        default: 'recovery'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Display Run Parameters
      run: |
        echo "::group::Build Parameters"
        echo "Device: SaluteTV (at30a6)"
        echo "Manifest: ${{ github.event.inputs.MANIFEST_URL }}"
        echo "Branch: ${{ github.event.inputs.MANIFEST_BRANCH }}"
        echo "Device Tree: ${{ github.event.inputs.DEVICE_TREE_URL }}"
        echo "Device Path: ${{ github.event.inputs.DEVICE_PATH }}"
        echo "Makefile: ${{ github.event.inputs.MAKEFILE_NAME }}"
        echo "Build Target: ${{ github.event.inputs.BUILD_TARGET }}.img"
        echo "::endgroup::"

    - name: Check Out
      uses: actions/checkout@v4

    - name: Cleanup Workspace
      uses: rokibhasansagar/slimhub_actions@main

    - name: Prepare Environment
      run: |
        sudo apt update
        sudo apt -y upgrade
        sudo apt -y install gperf gcc-multilib g++-multilib libc6-dev lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc bc ccache lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libxml2 lzop pngcrush schedtool squashfs-tools imagemagick libbz2-dev lzma ncftp libstdc++-10-dev libncurses5 python3 python-is-python3 flex bison repo

    - name: Install OpenJDK 11 (для Android 13)
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Setup SSH Keys (если нужно)
      if: ${{ startsWith(github.event.inputs.MANIFEST_URL, 'git@github.com') }}
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Initialize Repo
      run: |
        mkdir -p ~/bin
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo
        
        mkdir workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
        
        git config --global user.name "SKOCHE"
        git config --global user.email "github-actions@github.com"
        repo init --depth=1 -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }} --git-lfs
      id: workspace

    - name: Repo Sync
      run: |
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
      working-directory: ${{ steps.workspace.outputs.workspace-folder }}

    - name: Clone Device Tree
      run: |
        rm -rf ${{ github.event.inputs.DEVICE_PATH }}
        git clone ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} --depth=1 ./${{ github.event.inputs.DEVICE_PATH }}
      working-directory: ${{ steps.workspace.outputs.workspace-folder }}

    - name: Set Swap Space (16GB для компиляции)
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 16

    - name: Build TWRP Recovery
      run: |
        cd ${{ steps.workspace.outputs.workspace-folder }}
        source build/envsetup.sh
        
        # Экспортируем переменные для Amlogic 32-bit
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        export USE_CCACHE=1
        export CCACHE_EXEC=/usr/bin/ccache
        ccache -M 20G
        
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng
        make clean
        make ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)
        
        # Проверяем размеры файлов
        echo "::group::Build Output"
        ls -lh out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.img
        echo "::endgroup::"
      env:
        CCACHE_DIR: /tmp/ccache

    - name: Upload Recovery to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: twrp-at30a6-recovery
        path: ${{ steps.workspace.outputs.workspace-folder }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery.img
        retention-days: 7

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        files: ${{ steps.workspace.outputs.workspace-folder }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery.img
        name: "TWRP for SaluteTV (at30a6) - Build #${{ github.run_number }}"
        tag_name: "v${{ github.run_number }}"
        body: |
          ## TWRP Recovery for SaluteTV (at30a6)
          
          **Device:** SaluteTV (codename: at30a6)
          **Android:** 13 (SDK 33)
          **Architecture:** ARM 32-bit (armeabi-v7a)
          **Platform:** Amlogic
          
          **Build Info:**
          - Manifest: ${{ github.event.inputs.MANIFEST_BRANCH }}
          - Device Tree: ${{ github.event.inputs.DEVICE_TREE_BRANCH }}
          - Build Date: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          **Installation:**
          ```bash
          fastboot flash recovery recovery.img
          fastboot flash dtbo dtbo.img
          fastboot reboot recovery
          ```
          
          **Notes:**
          - Tested on SaluteTV with firmware v1.100.61-b23081
          - Supports FBE encryption
          - Includes Amlogic-specific drivers
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}