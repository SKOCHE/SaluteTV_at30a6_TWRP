name: Recovery Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'MANIFEST_URL'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'
      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH'
        required: true
        default: 'twrp-12.1'
      DEVICE_TREE_URL:
        description: 'DEVICE_TREE_URL'
        required: true
        default: 'https://github.com/SKOCHE/SaluteTV_at30a6_TWRP'
      DEVICE_TREE_BRANCH:
        description: 'DEVICE_TREE_BRANCH'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'DEVICE_PATH'
        required: true
        default: 'device/salute/at30a6'
      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
        default: 'at30a6'
      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME'
        required: true
        default: 'twrp_at30a6'
      BUILD_TARGET:
        description: 'BUILD_TARGET'
        required: true
        default: 'recovery'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Prepare environment
      run: |
        sudo apt update
        sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5 lib32ncurses5-dev lib32z1-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3 bc ccache liblz4-tool libsdl1.2-dev lzop pngcrush schedtool squashfs-tools imagemagick libbz2-dev lzma ncftp qemu-user-static python-is-python3
        sudo apt install -y libwxgtk3.0-gtk3-dev || true

    - name: Install OpenJDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '8'

    - name: Install repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Initialize repo
      run: |
        mkdir workspace
        cd workspace
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        repo init --depth=1 -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }}

    - name: Repo Sync
      run: |
        cd workspace
        repo sync -c --no-clone-bundle --force-sync -j$(nproc --all)

    - name: Clone device tree
      run: |
        cd workspace
        git clone ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ${{ github.event.inputs.DEVICE_PATH }}

    - name: Fix libbinder map file
      run: |
        cd workspace
        MAP_FILE="frameworks/native/libs/binder/libbinder.arm32.map"
        if [ -f "$MAP_FILE" ]; then
          sed -i 's/^\(    _ZN7android14IPCThreadState10freeBuffer.*\)$/#\1/' "$MAP_FILE"
          sed -i 's/^\(    _ZN7android6Parcel19ipcSetDataReference.*\)$/#\1/' "$MAP_FILE"
          sed -i 's/^\(    _ZN7androidlsIyEERNS_10TextOutputES2_RKT_.*\)$/#\1/' "$MAP_FILE"
          echo "Fixed libbinder.arm32.map"
        fi

    - name: Building recovery
      run: |
        cd workspace
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng
        make ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_TARGET }}.img
        name: ${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          **Manifest:** ${{ github.event.inputs.MANIFEST_BRANCH }}
          **Device:** ${{ github.event.inputs.DEVICE_NAME }}
          **Target:** ${{ github.event.inputs.BUILD_TARGET }}.img
          **Build date:** $(date +'%Y-%m-%d %H:%M:%S')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
