name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      device_codename:
        description: 'Device codename'
        required: true
        default: 'at30a6'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
    # Шаг 1: Установка зависимостей
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git openjdk-17-jdk ccache python3 \
          gcc-multilib g++-multilib libc6-dev libncurses5 \
          libxml2-utils xsltproc bc bison flex curl lzop \
          pngcrush squashfs-tools zip unzip
        
    # Шаг 2: Установка repo (минимальная версия)
    - name: Install repo tool
      run: |
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
        chmod a+x ~/repo
        sudo mv ~/repo /usr/local/bin/

    # Шаг 3: Инициализация с минимальной глубиной
    - name: Initialize TWRP source
      run: |
        mkdir twrp
        cd twrp
        # Используем минимальную глубину и ветку 12.1
        /usr/local/bin/repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git \
          -b twrp-12.1 \
          --depth=1 \
          --groups=all,-notdefault,-device,-mips

    # Шаг 4: Синхронизация только необходимого
    - name: Sync source (minimal)
      run: |
        cd twrp
        # Синхронизируем только основные компоненты
        /usr/local/bin/repo sync -c -j2 \
          --no-tags \
          --no-clone-bundle \
          --current-branch \
          --optimized-fetch \
          --force-sync \
          --fetch-submodules \
          build/make bionic system/core bootable/recovery

    # Шаг 5: Копирование дерева устройства
    - name: Copy device tree
      run: |
        mkdir -p twrp/device/salute/${{ github.event.inputs.device_codename }}
        # Копируем только нужные файлы
        cp -r *.mk *.txt recovery.fstab recovery/ prebuilt/ twrp/device/salute/${{ github.event.inputs.device_codename }}/ 2>/dev/null || true

    # Шаг 6: Быстрая сборка
    - name: Build recovery
      run: |
        cd twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        source build/envsetup.sh
        lunch twrp_${{ github.event.inputs.device_codename }}-eng
        make recoveryimage -j2

    # Шаг 7: Загрузка артефакта
    - name: Upload recovery image
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: recovery-${{ github.event.inputs.device_codename }}
        path: twrp/out/target/product/${{ github.event.inputs.device_codename }}/recovery.img
