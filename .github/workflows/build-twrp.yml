name: TWRP Build for at30a6

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    
    steps:
    - name: Checkout device tree
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
          git python3 openjdk-11-jdk curl \
          build-essential bc bison flex gperf zip unzip
    
    - name: Install repo tool
      run: |
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
        chmod +x ~/repo
        sudo mv ~/repo /usr/local/bin/
        repo version
    
    - name: Initialize and sync FULL TWRP
      env:
        ALLOW_MISSING_DEPENDENCIES: true
        LC_ALL: C
        USE_LD: gold
      run: |
        mkdir twrp && cd twrp
        
        # Initialize with minimal manifest
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git \
          -b twrp-11 --depth=1
        
        # SYNC EVERYTHING - no specific projects
        repo sync -c -j2 --no-tags --no-clone-bundle --force-sync
        
        # Copy device tree
        mkdir -p device/salute/at30a6
        cp -r ../*.mk ../prebuilt ../recovery device/salute/at30a6/ 2>/dev/null || true
        cp ../BoardConfig.mk device/salute/at30a6/ 2>/dev/null || true
        cp ../device.mk device/salute/at30a6/ 2>/dev/null || true
        
        echo "Device tree copied:"
        ls -la device/salute/at30a6/
    
    - name: Build TWRP
      env:
        ALLOW_MISSING_DEPENDENCIES: true
        LC_ALL: C
        USE_LD: gold
      run: |
        cd twrp
        
        # Build
        source build/envsetup.sh
        
        # Try different product names
        if lunch omni_at30a6-eng 2>/dev/null; then
          echo "Using omni_at30a6-eng"
        elif lunch twrp_at30a6-eng 2>/dev/null; then
          echo "Using twrp_at30a6-eng"
        else
          # Manual setup
          export TARGET_DEVICE=at30a6
          export TARGET_PRODUCT=omni_at30a6
          export TARGET_BUILD_VARIANT=eng
          echo "Manual: TARGET_PRODUCT=$TARGET_PRODUCT"
        fi
        
        # Build recovery
        make -j2 recoveryimage 2>&1 | tee build.log || {
          echo "First attempt failed, trying recovery target..."
          make -j2 recovery 2>&1 | tee -a build.log
        }
        
        # Find and copy result
        find out -name "recovery.img" -type f 2>/dev/null | head -1 | while read img; do
          echo "Found: $img"
          cp "$img" ../recovery.img
        done
        
        if [ -f "../recovery.img" ]; then
          echo "SUCCESS: recovery.img created"
          ls -lh ../recovery.img
        else
          echo "ERROR: No recovery.img found"
          echo "Last 20 lines of build.log:"
          tail -20 build.log
          exit 1
        fi
    
    - name: Upload result
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Recovery
        path: recovery.img
        if-no-files-found: error
    
    - name: Create release
      if: success() && github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        files: recovery.img
        tag_name: twrp-$(date +%Y%m%d-%H%M%S)
        name: "TWRP Recovery"
        body: |
          TWRP for SaluteTV at30a6
          Built: $(date)
        draft: false
