name: Build TWRP (Android 13)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4

    - name: Install Essential Build Tools
      run: |
        sudo apt-get update -y
        sudo apt-get install -y \
          git-core gnupg flex bison build-essential zip \
          curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 \
          libncurses5 lib32ncurses5-dev x11proto-core-dev libx11-dev \
          lib32z1-dev liblz4-tool libssl-dev libxml2-utils xsltproc unzip \
          fontconfig python2 python3 repo bc rsync schedtool

    - name: Clone and Setup TWRP Source
      run: |
        # Клонируем TWRP для Android 13
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-13.0 --depth=1
        
        # Создаем путь для устройства и копируем файлы
        mkdir -p device/salute/at30a6
        cp -r ./* device/salute/at30a6/ 2>/dev/null || true
        
        # Синхронизируем
        repo sync -c -j$(nproc) --no-tags --no-clone-bundle --force-sync

    - name: Fix Android Version
      run: |
        cd device/salute/at30a6
        sed -i 's/PLATFORM_VERSION := 11/PLATFORM_VERSION := 13/' BoardConfig.mk
        sed -i 's/PLATFORM_SECURITY_PATCH := 2099-12-31/PLATFORM_SECURITY_PATCH := 2025-01-01/' BoardConfig.mk
        echo "Fixed Android version to 13"

    - name: Build Recovery
      run: |
        # Настройка окружения
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        
        source build/envsetup.sh
        lunch twrp_at30a6-userdebug
        
        # Сборка с записью лога
        mka recoveryimage 2>&1 | tee /tmp/build.log

    - name: Check and Prepare Artifacts
      run: |
        echo "=== Checking build results ==="
        
        # Проверяем recovery.img
        if [ -f out/target/product/at30a6/recovery.img ]; then
          echo "✅ Recovery image found"
          ls -lh out/target/product/at30a6/recovery.img
          
          # Копируем ключевые файлы в корень для удобной загрузки
          cp out/target/product/at30a6/recovery.img recovery.img
          cp /tmp/build.log build.log
          cp device/salute/at30a6/BoardConfig.mk BoardConfig.mk
        else
          echo "❌ Recovery image NOT found"
          echo "Listing out/target/product/at30a6/:"
          ls -la out/target/product/at30a6/ || true
          exit 1
        fi

    - name: Upload Success Artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Recovery-Build
        path: |
          recovery.img
          build.log
          BoardConfig.mk
        retention-days: 7

    - name: Upload Failure Logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Failure-Logs
        path: |
          /tmp/build.log
          device/salute/at30a6/BoardConfig.mk
          device/salute/at30a6/*.mk
        retention-days: 30
