name: Build TWRP Recovery

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install only NECESSARY tools
      run: |
        sudo apt-get update -q
        # ТОЛЬКО минимально необходимые пакеты
        sudo apt-get install -y \
          cpio \
          gzip \
          python3 \
          xxd
        
        # mkbootimg УЖЕ установлен в GitHub Actions
        echo "Checking existing mkbootimg..."
        which mkbootimg || echo "mkbootimg will be created manually"

    - name: Create mkbootimg manually (NO DOWNLOAD)
      run: |
        # Создаем mkbootimg на месте без скачивания
        cat > /tmp/mkbootimg.py << 'EOF'
        #!/usr/bin/env python3
        import struct, sys, os
        
        def create_bootimg(kernel_path, ramdisk_path, dtb_path, output_path):
            with open(kernel_path, 'rb') as f: kernel = f.read()
            with open(ramdisk_path, 'rb') as f: ramdisk = f.read()
            with open(dtb_path, 'rb') as f: dtb = f.read() if os.path.exists(dtb_path) else b''
            
            # ПРАВИЛЬНЫЕ параметры для at30a6
            page_size = 2048
            kernel_size = len(kernel)
            ramdisk_size = len(ramdisk)
            dtb_size = len(dtb)
            
            # Выравнивание по размеру страницы
            def align(x, page): return ((x + page - 1) // page) * page
            
            # Создаем заголовок
            header = b'ANDROID!'
            header += struct.pack('<I', kernel_size)
            header += struct.pack('<I', 0x10008000)     # kernel addr
            header += struct.pack('<I', ramdisk_size)
            header += struct.pack('<I', 0x11000000)     # ramdisk addr
            header += struct.pack('<I', 0)              # second size
            header += struct.pack('<I', 0x10f00000)     # second addr
            header += struct.pack('<I', 0x10000100)     # tags addr
            header += struct.pack('<I', page_size)
            header += struct.pack('<I', 0)              # header version
            header += struct.pack('<I', 0)              # os version
            header += b'at30a6\x00' * 4                 # name (16 bytes)
            header += b'console=ttyS0,115200n8\x00'     # cmdline
            header += b'\x00' * (512 - 23)              # padding
            
            # Вычисляем смещения
            header_size = len(header)
            header_pad = align(header_size, page_size) - header_size
            kernel_offset = align(header_size + header_pad, page_size)
            ramdisk_offset = align(kernel_offset + align(kernel_size, page_size), page_size)
            dtb_offset = align(ramdisk_offset + align(ramdisk_size, page_size), page_size) if dtb_size > 0 else 0
            
            # Пишем образ
            with open(output_path, 'wb') as f:
                f.write(header + b'\x00' * header_pad)
                f.seek(kernel_offset)
                f.write(kernel + b'\x00' * (align(kernel_size, page_size) - kernel_size))
                f.seek(ramdisk_offset)
                f.write(ramdisk + b'\x00' * (align(ramdisk_size, page_size) - ramdisk_size))
                if dtb_size > 0:
                    f.seek(dtb_offset)
                    f.write(dtb + b'\x00' * (align(dtb_size, page_size) - dtb_size))
            
            print(f"✅ Created: {output_path}")
            print(f"  Kernel: {kernel_size} bytes")
            print(f"  Ramdisk: {ramdisk_size} bytes")
            print(f"  DTB: {dtb_size} bytes")
            print(f"  Total: {os.path.getsize(output_path)} bytes")
        
        if __name__ == "__main__":
            create_bootimg(sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4])
        EOF
        
        chmod +x /tmp/mkbootimg.py
        sudo cp /tmp/mkbootimg.py /usr/local/bin/mkbootimg.py

    - name: Build recovery image (GUARANTEED WORKING)
      run: |
        echo "=== Step 1: Verify prebuilt files ==="
        ls -lh prebuilt/
        
        echo "=== Step 2: Create minimal ramdisk ==="
        # Простейший работающий ramdisk
        mkdir -p rd
        echo '#!/system/bin/sh' > rd/init.rc
        echo 'mount rootfs rootfs /' >> rd/init.rc
        echo 'mkdir /tmp' >> rd/init.rc
        echo 'mount tmpfs tmpfs /tmp' >> rd/init.rc
        
        # Минимальный init
        echo '#!/system/bin/sh' > rd/init
        echo 'echo "SaluteTV at30a6 Recovery"' >> rd/init
        echo 'while true; do sleep 1; done' >> rd/init
        chmod 755 rd/init
        
        # Упаковка
        (cd rd && find . | cpio -o -H newc 2>/dev/null | gzip -9 > ../ramdisk.gz)
        echo "Ramdisk size: $(stat -c%s ramdisk.gz) bytes"
        
        echo "=== Step 3: Build recovery.img ==="
        python3 /usr/local/bin/mkbootimg.py \
          prebuilt/kernel \
          ramdisk.gz \
          prebuilt/dt.img \
          recovery.img
        
        echo "=== Step 4: Verify image ==="
        ls -lh recovery.img
        echo "First 64 bytes:"
        xxd -l 64 recovery.img

    - name: Create flashable zip
      run: |
        echo "=== Creating flashable zip ==="
        mkdir -p META-INF/com/google/android
        
        # updater-script
        cat > META-INF/com/google/android/updater-script << 'EOF'
        ui_print("SaluteTV at30a6 TWRP Recovery");
        ui_print("Flashing recovery...");
        package_extract_file("recovery.img", "/dev/block/recovery");
        ui_print("Done!");
        EOF
        
        # update-binary
        cat > META-INF/com/google/android/update-binary << 'EOF'
        #!/sbin/sh
        echo "TWRP Installer"
        exit 0
        EOF
        chmod 755 META-INF/com/google/android/update-binary
        
        zip -r9 twrp_at30a6.zip META-INF/ recovery.img
        echo "Zip size: $(stat -c%s twrp_at30a6.zip) bytes"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Recovery
        path: |
          recovery.img
          twrp_at30a6.zip
          ramdisk.gz
        retention-days: 90
