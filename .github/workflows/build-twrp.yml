name: Recovery Build

on:
  workflow_dispatch:
    inputs:
      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
        default: 'at30a6'
      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME'
        required: true
        default: 'twrp_at30a6'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    permissions:
      contents: write
      
    steps:
    - name: Check Out Device Tree
      uses: actions/checkout@v4

    - name: Cleanup Workspace
      uses: rokibhasansagar/slimhub_actions@main

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y gperf gcc-multilib g++-multilib libc6-dev \
          lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev \
          libgl1-mesa-dev libxml2-utils xsltproc bc ccache lib32readline-dev \
          lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev \
          libwxgtk3.0-gtk3-dev lzop pngcrush schedtool squashfs-tools python3 \
          git-core gnupg flex bison build-essential zip curl zlib1g-dev

    - name: Install OpenJDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install repo tool
      run: |
        mkdir -p ~/bin
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo cp ~/bin/repo /usr/bin/repo

    - name: Initialize TWRP Source
      run: |
        mkdir -p workspace
        cd workspace
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp -b twrp-12.1

    - name: Sync Source Code
      run: |
        cd workspace
        repo sync -c -j2 --no-tags --no-clone-bundle --force-sync

    - name: Copy Device Tree
      run: |
        mkdir -p workspace/device/salute/at30a6
        cp -r $GITHUB_WORKSPACE/* workspace/device/salute/at30a6/
        # Фиксим возможные ошибки в BoardConfig.mk
        cd workspace/device/salute/at30a6
        if [ -f BoardConfig.mk ]; then
          sed -i '/BOARD_CUSTOM_BOOTIMG_MK.*mkbootimg\.mk/d' BoardConfig.mk 2>/dev/null || true
        fi

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 8

    - name: Build Recovery
      run: |
        cd workspace
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        
        source build/envsetup.sh
        lunch twrp_at30a6-eng
        make clean
        make recoveryimage -j2

    - name: Upload Recovery Image
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: recovery-at30a6
        path: workspace/out/target/product/at30a6/recovery.img

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        files: workspace/out/target/product/at30a6/recovery.img
        name: "TWRP at30a6"
        tag_name: "build-${{ github.run_number }}"
        body: |
          TWRP Recovery for SaluteTV at30a6
          Built: $(date)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
