name: Build TWRP

on:
  workflow_dispatch:
    inputs:
      device_codename:
        description: 'Device codename'
        required: true
        default: 'at30a6'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Clean disk
      run: |
        sudo apt clean
        sudo rm -rf /usr/share/dotnet

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git openjdk-17-jdk python3
        sudo apt install -y gcc-multilib g++-multilib libc6-dev
        sudo apt install -y libxml2-utils xsltproc bc bison flex curl

    - name: Download minimal sources
      run: |
        mkdir twrp
        cd twrp
        
        echo "=== Cloning minimal sources ==="
        
        # Build system
        git clone https://github.com/LineageOS/android_build.git build/make -b lineage-20.0 --depth=1
        
        # Recovery
        git clone https://github.com/TeamWin/android_bootable_recovery.git bootable/recovery -b android-12.1 --depth=1
        
        # System core
        git clone https://github.com/LineageOS/android_system_core.git system/core -b lineage-20.0 --depth=1
        
        # Bionic
        git clone https://github.com/LineageOS/android_bionic.git bionic -b lineage-20.0 --depth=1
        
        # Create device directory
        mkdir -p device/salute/${{ github.event.inputs.device_codename }}

    - name: Copy device tree
      run: |
        cd twrp/device/salute/${{ github.event.inputs.device_codename }}
        cp $GITHUB_WORKSPACE/*.mk $GITHUB_WORKSPACE/recovery.fstab . 2>/dev/null || true

    - name: Try to build with minimal setup
      run: |
        cd twrp
        
        # Создаем минимальное окружение
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        export TARGET_DEVICE=${{ github.event.inputs.device_codename }}
        export TARGET_PRODUCT=twrp_${{ github.event.inputs.device_codename }}
        
        echo "=== Setting up environment ==="
        
        # Пробуем инициализировать
        if [ -f "build/make/envsetup.sh" ]; then
          source build/make/envsetup.sh
          lunch twrp_${{ github.event.inputs.device_codename }}-eng 2>/dev/null || true
        fi
        
        echo "=== Building recovery ==="
        
        # Пробуем собрать из recovery директории
        cd bootable/recovery
        mmma -j2 2>&1 | tail -100 || \
        echo "Build attempt finished"

    - name: Check for any output
      run: |
        echo "=== Checking for build output ==="
        find twrp -name "*.img" -type f 2>/dev/null | head -10 || echo "No images found"
        find twrp -name "recovery*" -type f 2>/dev/null | head -10 || echo "No recovery files"

    - name: Upload any artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: |
          twrp/out/
          twrp/*.img
          twrp/*.zip
