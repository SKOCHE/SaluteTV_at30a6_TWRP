name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      device_codename:
        description: 'Device codename'
        required: true
        default: 'at30a6'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
    - name: Clean disk space
      run: |
        echo "=== Cleaning disk ==="
        df -h
        sudo apt clean
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
        df -h

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git openjdk-17-jdk python3
        sudo apt install -y gcc-multilib g++-multilib libc6-dev
        sudo apt install -y libxml2-utils xsltproc bc bison flex curl
        sudo apt install -y lzop pngcrush squashfs-tools zip unzip

    - name: Install repo tool
      run: |
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
        chmod a+x ~/repo
        sudo mv ~/repo /usr/local/bin/

    - name: Initialize TWRP source
      run: |
        mkdir twrp
        cd twrp
        /usr/local/bin/repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1
        
        # Добавляем local manifest
        mkdir -p .repo/local_manifests
        echo '<?xml version="1.0" encoding="UTF-8"?>' > .repo/local_manifests/local.xml
        echo '<manifest>' >> .repo/local_manifests/local.xml
        echo '  <remote name="github" fetch="https://github.com" />' >> .repo/local_manifests/local.xml
        echo '  <project path="build/make" name="android_build" remote="github" revision="twrp-12.1" />' >> .repo/local_manifests/local.xml
        echo '  <project path="bootable/recovery" name="android_bootable_recovery" remote="github" revision="twrp-12.1" />' >> .repo/local_manifests/local.xml
        echo '  <project path="system/core" name="android_system_core" remote="github" revision="twrp-12.1" />' >> .repo/local_manifests/local.xml
        echo '  <project path="bionic" name="android_bionic" remote="github" revision="twrp-12.1" />' >> .repo/local_manifests/local.xml
        echo '  <project path="frameworks/base" name="android_frameworks_base" remote="github" revision="twrp-12.1" />' >> .repo/local_manifests/local.xml
        echo '</manifest>' >> .repo/local_manifests/local.xml
        
        /usr/local/bin/repo sync -c -j2 --no-tags --no-clone-bundle --current-branch

    - name: Copy device tree
      run: |
        mkdir -p twrp/device/salute/${{ github.event.inputs.device_codename }}
        cp -r *.mk recovery.fstab twrp/device/salute/${{ github.event.inputs.device_codename }}/ 2>/dev/null || true
        if [ -d "recovery" ]; then
          cp -r recovery twrp/device/salute/${{ github.event.inputs.device_codename }}/ 2>/dev/null || true
        fi
        if [ -d "prebuilt" ]; then
          cp -r prebuilt twrp/device/salute/${{ github.event.inputs.device_codename }}/ 2>/dev/null || true
        fi

    - name: Fix libbinder error
      run: |
        cd twrp
        if [ -f "frameworks/native/libs/binder/Android.bp" ]; then
          sed -i '/version_script: "libbinder.map.txt"/d' frameworks/native/libs/binder/Android.bp
        fi

    - name: Build recovery
      run: |
        cd twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        source build/envsetup.sh
        lunch twrp_${{ github.event.inputs.device_codename }}-eng
        make clean
        make recoveryimage -j2

    - name: Upload recovery image
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: recovery-${{ github.event.inputs.device_codename }}
        path: twrp/out/target/product/${{ github.event.inputs.device_codename }}/recovery.img
