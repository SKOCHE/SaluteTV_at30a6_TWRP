name: Build TWRP for at30a6

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout device tree
      uses: actions/checkout@v4
      with:
        repository: SKOCHE/SaluteTV_at30a6_TWRP
        path: device-tree
        
    - name: Create workspace
      run: |
        mkdir -p workspace result
        
    - name: Setup Docker with more disk space
      run: |
        # Увеличиваем место в Docker
        docker system prune -af
        echo "Docker disk space:"
        docker system df
        
    - name: Build using pre-built TWRP builder image
      run: |
        echo "🚀 Используем оптимизированный образ для сборки TWRP"
        
        # Используем специализированный образ для сборки Android/TWRP
        docker run --rm \
          -v "$(pwd)/device-tree:/root/device:ro" \
          -v "$(pwd)/result:/root/out" \
          -e DEVICE_NAME="at30a6" \
          lineageos4microg/docker-lineage-cicd:latest \
          /bin/bash -c "
            echo 'Настройка окружения...'
            
            # Создаем минимальное дерево устройства
            mkdir -p /root/android/device/salute/at30a6
            cp -r /root/device/* /root/android/device/salute/at30a6/ || true
            
            # Переходим в директорию
            cd /root/android
            
            # Инициализируем минимальный TWRP
            repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git \
              -b twrp-11.0 \
              --depth=1
            
            # Синхронизируем только необходимое
            repo sync -c -j2 --no-tags --no-clone-bundle --optimized-fetch
            
            # Настраиваем окружение
            source build/envsetup.sh
            export ALLOW_MISSING_DEPENDENCIES=true
            lunch omni_at30a6-eng || lunch twrp_at30a6-eng
            
            # Собираем
            mka recoveryimage -j2
            
            # Копируем результат
            find . -name 'recovery.img' -exec cp {} /root/out/ \; 2>/dev/null || true
            find . -name '*.img' -exec cp {} /root/out/ \; 2>/dev/null | head -1
            
            ls -la /root/out/
          "
          
    - name: Check and upload result
      run: |
        if [ -f "result/recovery.img" ] || [ $(ls -1 result/*.img 2>/dev/null | wc -l) -gt 0 ]; then
          echo "✅ Сборка успешна!"
          ls -lh result/
        else
          echo "⚠️ Файлы не найдены, попробуем альтернативный метод..."
          exit 1
        fi
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Recovery
        path: result/
        retention-days: 7
