name: TWRP Build
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
    - uses: actions/checkout@v4
    - name: Setup
      run: |
        sudo apt update && sudo apt install -y git python3 openjdk-11-jdk curl bc
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > /tmp/repo
        chmod +x /tmp/repo && sudo mv /tmp/repo /usr/local/bin/
    - name: Build
      run: |
        mkdir twrp && cd twrp
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11 --depth=1
        repo sync -c -j2 --no-tags --no-clone-bundle
        mkdir -p device/salute/at30a6
        cp ../*.mk device/salute/at30a6/
        [ -d "../prebuilt" ] && cp -r ../prebuilt device/salute/at30a6/
        export ALLOW_MISSING_DEPENDENCIES=true
        export USE_LD=gold
        source build/envsetup.sh
        lunch twrp_at30a6-eng 2>/dev/null || export TARGET_PRODUCT=twrp_at30a6
        make -j2 recoveryimage || make -j2 recovery
        
        # ИЩЕМ ВО ВСЕХ ВОЗМОЖНЫХ МЕСТАХ
        echo "Searching for recovery.img..."
        find . -type f -name "recovery.img" 2>/dev/null | head -5
        
        # Пробуем разные пути
        if [ -f "out/target/product/at30a6/recovery.img" ]; then
          cp out/target/product/at30a6/recovery.img ../recovery.img
          echo "Found in out/target/product/at30a6/"
        elif [ -f "out/target/product/*/recovery.img" ]; then
          cp out/target/product/*/recovery.img ../recovery.img
          echo "Found in out/target/product/*/"
        elif [ -f "out/dist/recovery.img" ]; then
          cp out/dist/recovery.img ../recovery.img
          echo "Found in out/dist/"
        else
          # Ищем любой .img файл
          find out -name "*.img" -type f 2>/dev/null | head -3 | while read img; do
            echo "Found image: $img"
            cp "$img" ../recovery.img
            break
          done
        fi
        
        # Проверяем результат
        if [ -f "../recovery.img" ]; then
          echo "✅ SUCCESS: TWRP built!"
          ls -lh ../recovery.img
          echo "Size: $(wc -c < ../recovery.img) bytes"
        else
          echo "❌ ERROR: No recovery.img found"
          echo "Listing output directory:"
          find out -name "*.img" -type f 2>/dev/null | head -10
          echo "Build completed but no image found"
          exit 1
        fi
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: TWRP
        path: recovery.img
        if-no-files-found: error
