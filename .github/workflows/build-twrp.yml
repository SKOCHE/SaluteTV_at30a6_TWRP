name: Build TWRP for at30a6

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04  # Используем более стабильную версию
    
    steps:
    - name: Checkout device tree
      uses: actions/checkout@v4
      with:
        repository: SKOCHE/SaluteTV_at30a6_TWRP
        path: device-tree
        
    - name: Create directories
      run: |
        mkdir -p workspace result
        
    - name: Clean Docker space
      run: |
        echo "Очистка Docker кэша..."
        docker system prune -af || true
        
    - name: Create fixed build script
      run: |
        echo "Создаем исправленный скрипт сборки..."
        
        # Создаем исправленный скрипт с решением проблемы линковки
        cat > build_fixed.sh << 'EOF'
        #!/bin/bash
        set -e
        
        echo "=== НАЧАЛО СБОРКИ TWRP (ИСПРАВЛЕННАЯ ВЕРСИЯ) ==="
        
        # Настройка Git
        git config --global user.email "builder@github.com"
        git config --global user.name "GitHub Actions Builder"
        git config --global url."https://".insteadOf git://
        git config --global url."https://github.com/".insteadOf git@github.com:
        
        # Переходим в рабочую директорию
        cd /android || exit 1
        
        # Инициализация репозитория TWRP
        echo "1. Инициализация TWRP..."
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1
        
        # Синхронизация
        echo "2. Синхронизация..."
        repo sync -c -j$(nproc) --no-tags --no-clone-bundle --optimized-fetch --force-sync
        
        # Копирование устройства
        echo "3. Копирование устройства..."
        if [ -d "/device" ]; then
          mkdir -p device/salute/at30a6
          cp -r /device/* device/salute/at30a6/ || echo "Копирование завершено"
        fi
        
        # Проверяем файлы
        echo "4. Проверка файлов устройства:"
        ls -la device/salute/at30a6/ || echo "Каталог не найден"
        
        # Проверяем наличие ядра
        echo "5. Проверка файла ядра:"
        if [ -f "device/salute/at30a6/prebuilt/kernel" ]; then
          echo "✅ Файл ядра найден"
          ls -lh "device/salute/at30a6/prebuilt/kernel"
        else
          echo "❌ Файл ядра НЕ найден"
          echo "Ищем другие файлы:"
          find device/salute/at30a6/ -name "*.img" -o -name "kernel*" 2>/dev/null || echo "Файлы не найдены"
        fi
        
        # Настройка окружения с исправлением проблемы линковки
        echo "6. Настройка окружения..."
        source build/envsetup.sh
        
        # ОЧЕНЬ ВАЖНО: Исправляем проблему линковки libbinder
        export USE_LD=gold  # Используем старый линкер gold вместо lld
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        export SKIP_ABI_CHECKS=true
        
        # Добавляем пути к компилятору
        export PATH="/android/prebuilts/clang/host/linux-x86/clang-r416183b1/bin:$PATH"
        
        echo "7. Выбор устройства..."
        if lunch twrp_at30a6-eng 2>/dev/null; then
          echo "Устройство: twrp_at30a6-eng"
        elif lunch omni_at30a6-eng 2>/dev/null; then
          echo "Устройство: omni_at30a6-eng"
        else
          echo "Показываем доступные устройства:"
          lunch 2>&1 | grep "at30a6" || lunch 2>&1 | head -10
          # Пробуем вручную установить переменные
          export TARGET_DEVICE=at30a6
          export TARGET_PRODUCT=twrp_at30a6
        fi
        
        # Сборка с дополнительными флагами для решения проблемы линковки
        echo "8. Начало сборки..."
        echo "Используемые ключевые настройки:"
        echo "  USE_LD=$USE_LD"
        echo "  ALLOW_MISSING_DEPENDENCIES=$ALLOW_MISSING_DEPENDENCIES"
        
        # Сначала пробуем собрать только recovery
        make -j$(nproc) recoveryimage 2>&1 | tee build.log || {
          echo "Сборка recoveryimage не удалась, проверяем логи..."
          
          # Проверяем на наличие ошибки линковки
          if grep -q "ld.lld: error: version script assignment" build.log; then
            echo "⚠️ Обнаружена ошибка линковки, применяем дополнительные исправления..."
            
            # Пробуем собрать без версионных скриптов
            echo "Пробуем сборку с отключенными версионными скриптами..."
            export LD_FLAGS="-Wl,--undefined-version"
            make -j$(nproc) recoveryimage 2>&1 | tee -a build.log || {
              echo "Вторая попытка также не удалась"
            }
          fi
        }
        
        # Поиск результатов
        echo "9. Поиск результатов..."
        mkdir -p /out
        
        # Копируем логи сборки
        cp build.log /out/build.log 2>/dev/null || echo "Лог сборки не найден"
        
        # Ищем файлы образа
        find out/target/product/ -name "recovery.img" -type f 2>/dev/null | head -1 | while read -r file; do
          echo "✅ Найден recovery.img: $file"
          cp "$file" /out/
          echo "Размер файла:"
          ls -lh "$file"
        done
        
        find out/target/product/ -name "boot.img" -type f 2>/dev/null | head -1 | while read -r file; do
          echo "✅ Найден boot.img: $file"
          cp "$file" /out/
        done
        
        find out/target/product/ -name "*.img" -type f 2>/dev/null | head -5 | while read -r file; do
          echo "Найден образ: $file"
          cp "$file" /out/ 2>/dev/null || true
        done
        
        # Если ничего не нашли, создаем информационный файл
        if [ ! -f /out/recovery.img ] && [ ! -f /out/boot.img ]; then
          echo "Файлы не найдены, создаем подробный info.txt"
          echo "Сборка TWRP для at30a6" > /out/info.txt
          echo "Дата: $(date)" >> /out/info.txt
          echo "Статус: Сборка прервана из-за ошибки" >> /out/info.txt
          echo "" >> /out/info.txt
          
          # Анализ ошибок
          echo "=== АНАЛИЗ ОШИБОК ===" >> /out/info.txt
          if [ -f "build.log" ]; then
            echo "Последние 20 строк лога:" >> /out/info.txt
            tail -20 build.log >> /out/info.txt
          fi
          
          echo "" >> /out/info.txt
          echo "=== КОНФИГУРАЦИЯ ЯДРА ===" >> /out/info.txt
          if [ -f "device/salute/at30a6/BoardConfig.mk" ]; then
            grep -E "(TARGET_PREBUILT_KERNEL|TARGET_KERNEL|BOARD_KERNEL)" device/salute/at30a6/BoardConfig.mk >> /out/info.txt 2>/dev/null || echo "Не найдены" >> /out/info.txt
          fi
        fi
        
        echo "10. Завершено!"
        echo "Содержимое /out:"
        ls -la /out/
        
        echo "=== КОНЕЦ СБОРКИ ==="
        EOF
        
        chmod +x build_fixed.sh
        
    - name: Run TWRP build with fixes
      run: |
        echo "🚀 Запуск сборки TWRP с исправлениями..."
        
        # Запускаем сборку с дополнительными зависимостями
        docker run --rm \
          -v "$(pwd)/device-tree:/device:ro" \
          -v "$(pwd)/result:/out" \
          -v "$(pwd)/build_fixed.sh:/build.sh:ro" \
          ubuntu:22.04 \
          /bin/bash -c "
            # Установка всех необходимых зависимостей
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y \
              git curl python3 python3-pip openjdk-11-jdk \
              build-essential flex bison gperf zip unzip \
              bc file ccache rsync libssl-dev libncurses-dev \
              libxml2-utils xsltproc zlib1g-dev liblz4-tool \
              binutils binutils-common binutils-x86-64-linux-gnu \
              gcc-multilib g++-multilib
            
            # Установка repo
            mkdir -p /tmp/repo
            curl -s https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
            chmod +x /usr/local/bin/repo
            
            # Настройка git (очень важно для repo sync)
            git config --global color.ui false
            git config --global http.postBuffer 1048576000
            
            # Создаем рабочую директорию
            mkdir -p /android
            cd /android
            
            # Запускаем исправленный скрипт сборки
            /build.sh
          "
          
    - name: Check and analyze results
      run: |
        echo "📋 Проверка и анализ результатов:"
        
        if [ -f "result/recovery.img" ]; then
          echo "🎉 УСПЕХ! recovery.img создан!"
          ls -lh result/recovery.img
          echo "✅ Сборка TWRP завершена успешно!"
          echo ""
          echo "Исправление сработало: использование USE_LD=gold решило проблему линковки libbinder"
        elif [ -f "result/boot.img" ]; then
          echo "✅ boot.img создан!"
          ls -lh result/boot.img
          echo "ℹ️ Собран boot образ, но не recovery"
        elif [ -f "result/info.txt" ]; then
          echo "📄 Информация о сборке:"
          cat result/info.txt
          
          # Проверяем логи сборки
          if [ -f "result/build.log" ]; then
            echo ""
            echo "🔍 Анализ логов сборки:"
            
            # Проверяем на наличие ошибок линковки
            if grep -q "ld.lld: error: version script assignment" result/build.log; then
              echo "❌ Ошибка линковки все еще присутствует"
              echo "Последние ошибки из лога:"
              grep -A5 -B2 "ld.lld: error" result/build.log | tail -20
              echo ""
              echo "Рекомендация: Попробуйте другую ветку TWRP (например, twrp-11 вместо twrp-12.1)"
            fi
            
            # Проверяем другие ошибки
            if grep -q "error:" result/build.log; then
              echo "Другие ошибки в логе:"
              grep "error:" result/build.log | tail -10
            fi
          fi
        else
          echo "❌ Результаты не найдены"
          echo "Содержимое result:"
          ls -la result/
        fi
        
    - name: Upload build results
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Build-Output
        path: result/
        retention-days: 7
        
    - name: Upload detailed logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Logs-Detailed
        path: |
          result/build.log
          result/info.txt
        retention-days: 7
