name: Build TWRP

on:
  workflow_dispatch:
    inputs:
      device_name:
        description: 'Device codename'
        required: true
        default: 'at30a6'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
    - name: Checkout device tree
      uses: actions/checkout@v4
    
    - name: Setup environment
      run: |
        sudo apt update
        sudo apt install -y git openjdk-11-jdk ccache python3 \
          gcc-multilib g++-multilib libc6-dev lib32ncurses5-dev \
          libxml2-utils xsltproc bc bison flex curl zip unzip \
          liblz4-tool libncurses5-dev libsdl1.2-dev lzop \
          pngcrush schedtool squashfs-tools gnupg build-essential
    
    - name: Initialize TWRP 11
      run: |
        mkdir twrp
        cd twrp
        git config --global user.name "GitHub"
        git config --global user.email "actions@github.com"
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11 --depth=1
        repo sync -c -j2 --no-tags --no-clone-bundle --force-sync
        
    - name: Copy device tree
      run: |
        mkdir -p twrp/device/salute/${{ github.event.inputs.device_name }}
        
        # Копируем ВСЕ файлы
        shopt -s dotglob
        cp -r * twrp/device/salute/${{ github.event.inputs.device_name }}/ 2>/dev/null || true
        
        cd twrp/device/salute/${{ github.event.inputs.device_name }}
        
        # Создаем recovery.fstab если нужно
        if [ ! -f "recovery.fstab" ]; then
          if [ -f "recovery/root/system/etc/twrp.flags" ]; then
            cp recovery/root/system/etc/twrp.flags recovery.fstab
            echo "Created recovery.fstab from twrp.flags"
          elif [ -f "fstab.amlogic" ]; then
            cp fstab.amlogic recovery.fstab
            echo "Created recovery.fstab from fstab.amlogic"
          fi
        fi
        
        echo "Files in device directory:"
        ls -la
        
    - name: Create missing Makefiles
      run: |
        cd twrp/device/salute/${{ github.event.inputs.device_name }}
        DEVICE_NAME="${{ github.event.inputs.device_name }}"
        
        # Если нет AndroidProducts.mk
        if [ ! -f "AndroidProducts.mk" ]; then
          echo "PRODUCT_MAKEFILES := \$(LOCAL_DIR)/twrp_${DEVICE_NAME}.mk" > AndroidProducts.mk
        fi
        
        # Если нет twrp_<device>.mk - создаем через echo
        if [ ! -f "twrp_${DEVICE_NAME}.mk" ]; then
          echo '$(call inherit-product, $(SRC_TARGET_DIR)/product/base.mk)' > twrp_${DEVICE_NAME}.mk
          echo '' >> twrp_${DEVICE_NAME}.mk
          echo "PRODUCT_DEVICE := ${DEVICE_NAME}" >> twrp_${DEVICE_NAME}.mk
          echo "PRODUCT_NAME := twrp_${DEVICE_NAME}" >> twrp_${DEVICE_NAME}.mk
          echo 'PRODUCT_BRAND := SaluteTV' >> twrp_${DEVICE_NAME}.mk
          echo 'PRODUCT_MODEL := AT30A6' >> twrp_${DEVICE_NAME}.mk
          echo 'PRODUCT_MANUFACTURER := SaluteTV' >> twrp_${DEVICE_NAME}.mk
        fi
        
    - name: Build TWRP
      run: |
        cd twrp
        
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        
        source build/envsetup.sh
        
        # Пробуем разные варианты lunch
        lunch omni_${{ github.event.inputs.device_name }}-eng 2>/dev/null || \
        lunch twrp_${{ github.event.inputs.device_name }}-eng 2>/dev/null || \
        { echo "Trying to set up manually..."; \
          export TARGET_DEVICE=${{ github.event.inputs.device_name }}; \
          export TARGET_PRODUCT=twrp_${{ github.event.inputs.device_name }}; }
        
        make clean
        make recoveryimage -j2
        
    - name: Upload recovery image
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: twrp-recovery
        path: twrp/out/target/product/${{ github.event.inputs.device_name }}/recovery.img
        
    - name: Create release
      uses: softprops/action-gh-release@v1
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: twrp-${{ github.event.inputs.device_name }}
        name: "TWRP ${{ github.event.inputs.device_name }}"
        files: twrp/out/target/product/${{ github.event.inputs.device_name }}/recovery.img
