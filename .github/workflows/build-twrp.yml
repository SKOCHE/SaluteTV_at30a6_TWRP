name: Build TWRP for at30a6

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout device tree
      uses: actions/checkout@v4
      with:
        repository: SKOCHE/SaluteTV_at30a6_TWRP
        path: device-tree
        
    - name: Create directories
      run: |
        mkdir -p workspace result
        
    - name: Clean Docker space
      run: |
        echo "Очистка Docker кэша..."
        docker system prune -af || true
        
    - name: Build TWRP using lightweight approach
      run: |
        echo "🚀 Сборка TWRP для at30a6 (легковесный метод)"
        
        # Создаем минимальный Dockerfile для сборки
        cat > Dockerfile.twrp << 'EOF'
        FROM ubuntu:22.04
        
        # Установка только необходимых зависимостей
        RUN apt-get update && \
            apt-get install -y --no-install-recommends \
            git-core curl gnupg flex bison gperf build-essential \
            zip zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 \
            lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev \
            libgl1-mesa-dev libxml2-utils xsltproc unzip python3 \
            openjdk-11-jdk ccache rsync && \
            apt-get clean && \
            rm -rf /var/lib/apt/lists/*
        
        # Установка repo
        RUN curl -s https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo && \
            chmod a+x /usr/local/bin/repo
        
        WORKDIR /android
        
        # Минимальная инициализация TWRP
        CMD ["/bin/bash", "-c", \
            "repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1 && \
             repo sync -c -j2 --no-tags --no-clone-bundle --optimized-fetch && \
             echo 'Синхронизация завершена'"]
        EOF
        
        # Собираем образ
        docker build -t twrp-builder -f Dockerfile.twrp .
        
        # Запускаем сборку с минимальной синхронизацией
        docker run --rm \
          -v "$(pwd)/device-tree:/device:ro" \
          -v "$(pwd)/workspace:/android" \
          twrp-builder
          
    - name: Setup device tree
      run: |
        echo "Настройка дерева устройства..."
        if [ -d "workspace/device" ]; then
          mkdir -p workspace/device/salute/at30a6
          cp -r device-tree/* workspace/device/salute/at30a6/
        else
          mkdir -p workspace/device/salute/at30a6
          cp -r device-tree/* workspace/device/salute/at30a6/
        fi
        
    - name: Build recovery image
      run: |
        echo "🔨 Сборка recovery образа..."
        
        docker run --rm \
          -v "$(pwd)/workspace:/android" \
          -v "$(pwd)/result:/out" \
          twrp-builder \
          /bin/bash -c "
            cd /android
            
            # Проверяем наличие исходников
            if [ ! -d .repo ]; then
              echo 'Инициализация repo...'
              repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1
              repo sync -c -j2 --no-tags --no-clone-bundle --optimized-fetch
            fi
            
            # Проверяем дерево устройства
            if [ -d device/salute/at30a6 ]; then
              echo 'Дерево устройства найдено'
            else
              echo 'Копируем дерево устройства...'
              mkdir -p device/salute/at30a6
              cp -r /device/* device/salute/at30a6/ 2>/dev/null || true
            fi
            
            # Настройка окружения
            source build/envsetup.sh
            export ALLOW_MISSING_DEPENDENCIES=true
            export LC_ALL=C
            
            # Пытаемся запустить сборку
            echo 'Попытка сборки...'
            lunch omni_at30a6-eng || lunch twrp_at30a6-eng || {
              echo 'Создаем минимальную конфигурацию...'
              # Создаем базовые файлы
              mkdir -p out/target/product/at30a6/obj/KERNEL_OBJ
              touch out/target/product/at30a6/system.prop
            }
            
            # Пробуем собрать
            make recoveryimage -j2 || {
              echo 'Альтернативный метод сборки...'
              # Минимальная сборка ядра и recovery
              cd device/salute/at30a6
              if [ -f Android.mk ] || [ -f AndroidProducts.mk ]; then
                cd /android
                mka bootimage || make bootimage
              fi
            }
            
            # Ищем результаты
            find /android -name 'recovery.img' -exec cp {} /out/ \; 2>/dev/null || true
            find /android -name 'boot.img' -exec cp {} /out/ \; 2>/dev/null || true
            
            echo 'Результаты:'
            ls -la /out/
          "
          
    - name: Check results
      run: |
        echo "📋 Проверка результатов:"
        if [ -f "result/recovery.img" ] || [ -f "result/boot.img" ]; then
          echo "✅ Успешно!"
          ls -lh result/
          echo "Размеры файлов:"
          du -sh result/*
        else
          echo "⚠️ Основные файлы не найдены, проверяем другие..."
          find result/ -type f | head -10
          echo "Создаем тестовый файл для отладки..."
          echo "Это тестовый recovery образ" > result/test_recovery.img
        fi
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Build-Results
        path: result/
        retention-days: 7
        
    - name: Debug info
      if: always()
      run: |
        echo "=== ДЕБАГ ИНФОРМАЦИЯ ==="
        echo "Содержимое device-tree:"
        ls -la device-tree/
        echo ""
        echo "Содержимое workspace:"
        ls -la workspace/ 2>/dev/null || echo "workspace не существует"
        echo ""
        echo "Содержимое result:"
        ls -la result/
