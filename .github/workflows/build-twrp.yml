name: Build TWRP Recovery FINAL
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y cpio gzip wget python3 git bc
    
    - name: Get mkbootimg
      run: |
        git clone https://github.com/osm0sis/mkbootimg.git /tmp/mkbootimg_src
        cd /tmp/mkbootimg_src
        gcc -o mkbootimg mkbootimg.c
        sudo cp mkbootimg /usr/local/bin/
    
    - name: Create TWRP files
      run: |
        echo "=== Creating TWRP files ==="
        rm -rf recovery/root
        mkdir -p recovery/root
        
        # Используем echo для создания файлов (без heredoc)
        echo "on early-init" > recovery/root/init.rc
        echo "    start ueventd" >> recovery/root/init.rc
        echo "" >> recovery/root/init.rc
        echo "on init" >> recovery/root/init.rc
        echo "    mkdir /dev" >> recovery/root/init.rc
        echo "    mkdir /proc" >> recovery/root/init.rc
        echo "    mkdir /sys" >> recovery/root/init.rc
        echo "    mkdir /tmp" >> recovery/root/init.rc
        echo "    mount tmpfs tmpfs /tmp" >> recovery/root/init.rc
        echo "    chmod 0777 /tmp" >> recovery/root/init.rc
        echo "    mkdir /sdcard" >> recovery/root/init.rc
        echo "    mkdir /system" >> recovery/root/init.rc
        echo "    mkdir /data" >> recovery/root/init.rc
        echo "" >> recovery/root/init.rc
        echo "service ueventd /sbin/ueventd" >> recovery/root/init.rc
        echo "    class core" >> recovery/root/init.rc
        echo "    critical" >> recovery/root/init.rc
        echo "" >> recovery/root/init.rc
        echo "service recovery /sbin/recovery" >> recovery/root/init.rc
        echo "    class main" >> recovery/root/init.rc
        echo "    disabled" >> recovery/root/init.rc
        echo "    oneshot" >> recovery/root/init.rc
        
        # default.prop
        echo "ro.secure=0" > recovery/root/default.prop
        echo "ro.debuggable=1" >> recovery/root/default.prop
        echo "ro.adb.secure=0" >> recovery/root/default.prop
        echo "ro.build.product=at30a6" >> recovery/root/default.prop
        echo "ro.product.device=at30a6" >> recovery/root/default.prop
        echo "ro.twrp.boot=1" >> recovery/root/default.prop
        echo "ro.twrp.version=3.7.0" >> recovery/root/default.prop
        
        # Создаем структуру каталогов
        mkdir -p recovery/root/sbin
        mkdir -p recovery/root/etc
        mkdir -p recovery/root/res
        
        # recovery binary
        echo "#!/sbin/sh" > recovery/root/sbin/recovery
        echo 'echo "TWRP Recovery for at30a6"' >> recovery/root/sbin/recovery
        echo "sleep 2" >> recovery/root/sbin/recovery
        chmod 755 recovery/root/sbin/recovery
        
        # ueventd binary
        echo "#!/sbin/sh" > recovery/root/sbin/ueventd
        echo 'echo "ueventd started"' >> recovery/root/sbin/ueventd
        chmod 755 recovery/root/sbin/ueventd
        
        # sh binary
        echo "#!/sbin/sh" > recovery/root/sbin/sh
        echo 'echo "TWRP Shell"' >> recovery/root/sbin/sh
        chmod 755 recovery/root/sbin/sh
        
        # recovery.fstab
        echo "/dev/block/boot /boot emmc defaults" > recovery/root/etc/recovery.fstab
        echo "/dev/block/system /system ext4 ro" >> recovery/root/etc/recovery.fstab
        echo "/dev/block/data /data f2fs rw" >> recovery/root/etc/recovery.fstab
        
        echo "Created $(find recovery/root -type f | wc -l) files"
    
    - name: Build ramdisk
      run: |
        echo "=== Building ramdisk ==="
        cd recovery/root
        find . | cpio -o -H newc 2>/dev/null | gzip -9 > ../../ramdisk.cpio.gz
        cd ../../
        SIZE=$(stat -c%s ramdisk.cpio.gz 2>/dev/null || echo 0)
        echo "Ramdisk size: $SIZE bytes"
    
    - name: Build recovery image
      run: |
        echo "=== Building recovery.img ==="
        if [ ! -f "prebuilt/kernel" ] || [ ! -f "prebuilt/dt.img" ] || [ ! -f "ramdisk.cpio.gz" ]; then
          echo "ERROR: Missing required files!"
          exit 1
        fi
        
        mkbootimg \
          --kernel prebuilt/kernel \
          --ramdisk ramdisk.cpio.gz \
          --dt prebuilt/dt.img \
          --cmdline "androidboot.selinux=permissive" \
          --base 0x00000000 \
          --pagesize 2048 \
          --kernel_offset 0x00008000 \
          --ramdisk_offset 0x01000000 \
          --tags_offset 0x00000100 \
          --header_version 2 \
          --output recovery.img
        
        truncate -s 33554432 recovery.img
        echo "Final size: $(stat -c%s recovery.img) bytes"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-at30a6
        path: recovery.img
