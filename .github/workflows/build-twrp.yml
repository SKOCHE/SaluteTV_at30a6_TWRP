name: Build TWRP for at30a6

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout device tree
      uses: actions/checkout@v4
      with:
        repository: SKOCHE/SaluteTV_at30a6_TWRP
        path: device-tree
        
    - name: Create directories
      run: |
        mkdir -p workspace result
        
    - name: Clean Docker space
      run: |
        echo "Очистка Docker кэша..."
        docker system prune -af || true
        
    - name: Create simple build script
      run: |
        echo "Создаем простой скрипт сборки..."
        
        # Создаем максимально простой скрипт без сложного синтаксиса
        cat > build_simple.sh << 'EOF'
        #!/bin/bash
        set -e
        
        echo "=== НАЧАЛО СБОРКИ TWRP ==="
        
        # Настройка Git
        git config --global user.email "builder@github.com"
        git config --global user.name "GitHub Actions Builder"
        git config --global url."https://".insteadOf git://
        git config --global url."https://github.com/".insteadOf git@github.com:
        
        # Переходим в рабочую директорию
        cd /android || exit 1
        
        # Инициализация репозитория TWRP
        echo "1. Инициализация TWRP..."
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1
        
        # Синхронизация
        echo "2. Синхронизация..."
        repo sync -c -j2 --no-tags --no-clone-bundle --optimized-fetch
        
        echo "3. Размер .repo:"
        du -sh .repo || echo "Не удалось определить размер"
        
        # Копирование устройства
        echo "4. Копирование устройства..."
        if [ -d "/device" ]; then
          mkdir -p device/salute/at30a6
          cp -r /device/* device/salute/at30a6/ 2>/dev/null || echo "Не удалось скопировать все файлы"
        fi
        
        # Проверяем файлы
        echo "5. Проверка файлов устройства:"
        ls -la device/salute/at30a6/ 2>/dev/null || echo "Каталог не найден"
        
        # Настройка окружения
        echo "6. Настройка окружения..."
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        
        # Пытаемся выбрать конфигурацию
        echo "7. Выбор устройства..."
        if lunch twrp_at30a6-eng 2>/dev/null; then
          echo "Устройство: twrp_at30a6-eng"
        elif lunch omni_at30a6-eng 2>/dev/null; then
          echo "Устройство: omni_at30a6-eng"
        else
          echo "Не удалось выбрать устройство, пробуем вручную..."
          # Показываем доступные устройства
          lunch 2>&1 | head -20
        fi
        
        # Сборка
        echo "8. Начало сборки..."
        make -j2 recoveryimage 2>&1 | tee build.log || {
          echo "Сборка recoveryimage не удалась, пробуем bootimage..."
          make -j2 bootimage 2>&1 | tee -a build.log || echo "Сборка bootimage не удалась"
        }
        
        # Поиск результатов
        echo "9. Поиск результатов..."
        mkdir -p /out
        
        # Ищем файлы
        find out/target/product/ -name "recovery.img" -type f 2>/dev/null | head -1 | while read -r file; do
          echo "Найден recovery.img: $file"
          cp "$file" /out/
        done
        
        find out/target/product/ -name "boot.img" -type f 2>/dev/null | head -1 | while read -r file; do
          echo "Найден boot.img: $file"
          cp "$file" /out/
        done
        
        # Если ничего не нашли, создаем информационный файл
        if [ ! -f /out/recovery.img ] && [ ! -f /out/boot.img ]; then
          echo "Файлы не найдены, создаем info.txt"
          echo "Сборка TWRP для at30a6" > /out/info.txt
          echo "Дата: $(date)" >> /out/info.txt
          echo "" >> /out/info.txt
          echo "Содержимое device/salute/at30a6:" >> /out/info.txt
          ls -la device/salute/at30a6/ >> /out/info.txt 2>/dev/null || echo "Каталог не найден" >> /out/info.txt
          echo "" >> /out/info.txt
          echo "BoardConfig.mk настройки ядра:" >> /out/info.txt
          grep -E "(TARGET_PREBUILT_KERNEL|TARGET_KERNEL_SOURCE)" device/salute/at30a6/BoardConfig.mk >> /out/info.txt 2>/dev/null || echo "Не найдены" >> /out/info.txt
        fi
        
        echo "10. Завершено!"
        echo "Содержимое /out:"
        ls -la /out/
        
        echo "=== КОНЕЦ СБОРКИ ==="
        EOF
        
        chmod +x build_simple.sh
        
    - name: Run TWRP build
      run: |
        echo "🚀 Запуск сборки TWRP..."
        
        # Запускаем сборку в Docker с минимальным набором
        docker run --rm \
          -v "$(pwd)/device-tree:/device:ro" \
          -v "$(pwd)/result:/out" \
          -v "$(pwd)/build_simple.sh:/build.sh:ro" \
          ubuntu:22.04 \
          /bin/bash -c "
            # Установка зависимостей
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y \
              git curl python3 openjdk-11-jdk build-essential \
              flex bison gperf zip unzip bc file ccache rsync
            
            # Установка repo
            curl -s https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
            chmod +x /usr/local/bin/repo
            
            # Создаем рабочую директорию
            mkdir -p /android
            cd /android
            
            # Запускаем скрипт сборки
            /build.sh
          "
          
    - name: Check results
      run: |
        echo "📋 Проверка результатов:"
        
        if [ -f "result/recovery.img" ]; then
          echo "🎉 УСПЕХ! recovery.img создан!"
          ls -lh result/recovery.img
          echo "✅ Сборка TWRP завершена успешно!"
          exit 0
        elif [ -f "result/boot.img" ]; then
          echo "✅ boot.img создан!"
          ls -lh result/boot.img
          echo "ℹ️ Собран boot образ, но не recovery"
        elif [ -f "result/info.txt" ]; then
          echo "📄 Информация о сборке:"
          cat result/info.txt
          
          # Проверяем конфигурацию ядра
          echo ""
          echo "🔍 Проверка конфигурации ядра:"
          if grep -q "TARGET_PREBUILT_KERNEL" device-tree/BoardConfig.mk; then
            KERNEL_PATH=$(grep "TARGET_PREBUILT_KERNEL" device-tree/BoardConfig.mk | cut -d '=' -f2 | xargs)
            echo "В BoardConfig.mk указан: $KERNEL_PATH"
            
            # Проверяем существует ли файл
            REL_PATH=$(echo "$KERNEL_PATH" | sed 's/^device\/salute\/at30a6\///')
            if [ -f "device-tree/$REL_PATH" ]; then
              echo "✅ Файл ядра найден: device-tree/$REL_PATH"
              ls -lh "device-tree/$REL_PATH"
            else
              echo "❌ Файл ядра НЕ найден по пути: device-tree/$REL_PATH"
              echo "Содержимое prebuilt:"
              ls -la device-tree/prebuilt/ 2>/dev/null || echo "Папка prebuilt не существует"
            fi
          else
            echo "❌ TARGET_PREBUILT_KERNEL не указан в BoardConfig.mk"
            echo "Добавьте в BoardConfig.mk:"
            echo "TARGET_PREBUILT_KERNEL := device/salute/at30a6/prebuilt/kernel"
          fi
        else
          echo "❌ Результаты не найдены"
          echo "Содержимое result:"
          ls -la result/
        fi
        
    - name: Fix kernel configuration
      if: failure()
      run: |
        echo "🛠 Исправление конфигурации ядра..."
        
        # Проверяем prebuilt папку
        echo "Содержимое prebuilt:"
        ls -la device-tree/prebuilt/ 2>/dev/null || {
          echo "Создаю папку prebuilt..."
          mkdir -p device-tree/prebuilt
          echo "kernel" > device-tree/prebuilt/README.txt
          echo "Поместите файл ядра сюда и назовите его 'kernel'" >> device-tree/prebuilt/README.txt
        }
        
        # Проверяем BoardConfig.mk
        if [ -f "device-tree/BoardConfig.mk" ]; then
          echo ""
          echo "Текущий BoardConfig.mk (последние 15 строк):"
          tail -15 device-tree/BoardConfig.mk
          
          # Проверяем настройки ядра
          if ! grep -q "TARGET_PREBUILT_KERNEL" device-tree/BoardConfig.mk; then
            echo ""
            echo "Добавляю TARGET_PREBUILT_KERNEL..."
            echo "" >> device-tree/BoardConfig.mk
            echo "# Kernel configuration" >> device-tree/BoardConfig.mk
            echo "TARGET_PREBUILT_KERNEL := device/salute/at30a6/prebuilt/kernel" >> device-tree/BoardConfig.mk
            echo "BOARD_KERNEL_CMDLINE := console=ttyMT0,921600n1" >> device-tree/BoardConfig.mk
            echo "BOARD_KERNEL_BASE := 0x40078000" >> device-tree/BoardConfig.mk
            echo "BOARD_KERNEL_PAGESIZE := 2048" >> device-tree/BoardConfig.mk
            echo "BOARD_KERNEL_OFFSET := 0x00008000" >> device-tree/BoardConfig.mk
            echo "BOARD_RAMDISK_OFFSET := 0x14f88000" >> device-tree/BoardConfig.mk
            echo "BOARD_TAGS_OFFSET := 0x13f88000" >> device-tree/BoardConfig.mk
            echo "BOARD_BOOTIMG_HEADER_VERSION := 2" >> device-tree/BoardConfig.mk
            echo ""
            echo "✅ Конфигурация добавлена"
          fi
        fi
        
    - name: Create test kernel file
      if: failure()
      run: |
        echo "📝 Создание тестового файла ядра для проверки..."
        
        # Создаем тестовый файл ядра
        mkdir -p device-tree/prebuilt
        if [ ! -f "device-tree/prebuilt/kernel" ]; then
          echo "Создаю тестовый файл ядра..."
          # Создаем минимальный заголовок boot.img
          dd if=/dev/zero of=device-tree/prebuilt/kernel bs=1M count=10
          echo "ANDROID!" | dd of=device-tree/prebuilt/kernel conv=notrunc
          echo "✅ Тестовый файл ядра создан"
          ls -lh device-tree/prebuilt/kernel
        fi
        
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Build-Output
        path: result/
        retention-days: 7
        
    - name: Upload device tree with fixes
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Device-Tree-With-Fixes
        path: device-tree/
        retention-days: 7
