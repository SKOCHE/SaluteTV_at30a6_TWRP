name: Build TWRP

on:
  workflow_dispatch:
    inputs:
      device_name:
        description: 'Device codename'
        required: true
        default: 'at30a6'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git openjdk-17-jdk ccache python3 \
          gcc-multilib g++-multilib libc6-dev libncurses5 \
          libxml2-utils xsltproc bc bison flex curl lzop \
          pngcrush squashfs-tools zip unzip repo
        
    - name: Get TWRP source
      run: |
        mkdir twrp && cd twrp
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
        repo sync -c -j2
        
    - name: Copy device tree
      run: |
        mkdir -p twrp/device/salute/${{ github.event.inputs.device_name }}
        # Копируем файлы дерева устройства
        cp -r *.mk recovery.fstab recovery/ prebuilt/ twrp/device/salute/${{ github.event.inputs.device_name }}/ 2>/dev/null || true
        
    - name: Fix libbinder error
      run: |
        cd twrp
        # Исправляем проблему с version_script в libbinder
        sed -i '/version_script: "libbinder.map.txt"/d' frameworks/native/libs/binder/Android.bp 2>/dev/null || true
        # Альтернативное исправление
        sed -i 's/version_script: "libbinder.map.txt",/# version_script: "libbinder.map.txt",/' frameworks/native/libs/binder/Android.bp 2>/dev/null || true
        
    - name: Build
      run: |
        cd twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        source build/envsetup.sh
        lunch twrp_${{ github.event.inputs.device_name }}-eng
        make recoveryimage -j$(nproc --all)
        
    - name: Upload recovery
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: twrp-recovery
        path: twrp/out/target/product/${{ github.event.inputs.device_name }}/recovery.img
