name: TWRP Build

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build with Docker (solves disk space)
      run: |
        docker run --rm -v "$(pwd):/device:ro" \
          -v /tmp/twrp-out:/output \
          ubuntu:22.04 /bin/bash -c "
            apt-get update && apt-get install -y git curl python3 bc
            curl -s https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
            chmod +x /usr/local/bin/repo
            
            mkdir /twrp && cd /twrp
            repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11 --depth=1
            
            # SYNC ONLY 3 ESSENTIAL PROJECTS
            repo sync -c -j2 \
              platform/build \
              bootable/recovery \
              platform/bionic \
              --no-tags --no-clone-bundle --optimized-fetch
            
            mkdir -p device/salute/at30a6
            cp /device/BoardConfig.mk /device/device.mk device/salute/at30a6/
            [ -d '/device/prebuilt' ] && cp -r /device/prebuilt device/salute/at30a6/
            
            export ALLOW_MISSING_DEPENDENCIES=true
            export USE_LD=gold
            source build/envsetup.sh 2>/dev/null || true
            
            # Direct build
            export TARGET_DEVICE=at30a6
            export TARGET_PRODUCT=twrp_at30a6
            
            make -j2 recoveryimage 2>&1 | tail -50 || make -j2 recovery 2>&1 | tail -50
            
            find . -name 'recovery.img' -exec cp {} /output/ \; 2>/dev/null || echo 'No recovery.img'
          "
    
    - name: Check result
      run: |
        if [ -f "/tmp/twrp-out/recovery.img" ]; then
          cp /tmp/twrp-out/recovery.img recovery.img
          echo "✅ SUCCESS"
          ls -lh recovery.img
        else
          echo "❌ No recovery.img found"
          exit 1
        fi
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Recovery
        path: recovery.img
        if-no-files-found: error
