name: Build TWRP Recovery

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install necessary tools
      run: |
        sudo apt-get update -q
        sudo apt-get install -y \
          cpio \
          gzip \
          python3 \
          xxd \
          wget
        
        echo "Checking existing mkbootimg..."
        which mkbootimg || echo "mkbootimg will be installed"

    - name: Install real mkbootimg tools
      run: |
        # Установим реальный mkbootimg из исходников Android
        echo "=== Installing Android mkbootimg tools ==="
        
        # Скачиваем и компилируем mkbootimg
        wget -q https://raw.githubusercontent.com/osm0sis/mkbootimg/master/mkbootimg -O /tmp/mkbootimg
        wget -q https://raw.githubusercontent.com/osm0sis/mkbootimg/master/unpackbootimg -O /tmp/unpackbootimg
        chmod +x /tmp/mkbootimg /tmp/unpackbootimg
        sudo cp /tmp/mkbootimg /tmp/unpackbootimg /usr/local/bin/
        
        # Проверяем
        mkbootimg --version 2>/dev/null || echo "mkbootimg installed successfully"

    - name: Build recovery image (CORRECT VERSION)
      run: |
        echo "=== Step 1: Verify prebuilt files ==="
        ls -lh prebuilt/
        
        echo "=== Step 2: Create proper ramdisk ==="
        # Создаем правильный ramdisk для recovery
        mkdir -p rd
        cd rd
        
        # Минимальная структура для Android recovery
        mkdir -p sbin
        mkdir -p system/bin
        mkdir -p tmp
        
        # init.rc для recovery
        cat > init.rc << 'EOF'
# Инициализация recovery
on early-init
    start ueventd

on init
    mkdir /dev
    mkdir /proc
    mkdir /sys
    mount tmpfs tmpfs /tmp
    chmod 0777 /tmp

on post-fs
    mount proc /proc /proc
    mount sysfs /sys /sys

service recovery /sbin/recovery
    oneshot

service ueventd /sbin/ueventd
    critical
    seclabel u:r:ueventd:s0
EOF
        
        # Простой init
        cat > init << 'EOF'
#!/system/bin/sh
echo ""
echo "========================================"
echo "  SaluteTV at30a6 TWRP Recovery"
echo "========================================"
echo ""
exec /system/bin/sh
EOF
        chmod 755 init
        
        # Простой recovery бинарник
        cat > sbin/recovery << 'EOF'
#!/system/bin/sh
echo "TWRP Recovery started"
echo "Press any key to reboot..."
read
reboot
EOF
        chmod 755 sbin/recovery
        
        # Ueventd
        cat > sbin/ueventd << 'EOF'
#!/system/bin/sh
echo "Ueventd started"
EOF
        chmod 755 sbin/ueventd
        
        # Упаковка ramdisk
        echo "Creating ramdisk..."
        find . | cpio -o -H newc 2>/dev/null | gzip -9 > ../ramdisk.gz
        cd ..
        
        echo "Ramdisk size: $(stat -c%s ramdisk.gz) bytes"
        
        echo "=== Step 3: Build recovery.img with CORRECT parameters ==="
        # Используем ПРАВИЛЬНЫЕ параметры из Android Image Kitchen
        mkbootimg \
          --kernel prebuilt/kernel \
          --ramdisk ramdisk.gz \
          --dt prebuilt/dt.img \
          --base 0x10000000 \
          --kernel_offset 0x00008000 \
          --ramdisk_offset 0x01000000 \
          --second_offset 0x00f00000 \
          --tags_offset 0x00000100 \
          --pagesize 2048 \
          --header_version 0 \
          --cmdline "30a6" \
          --board "at30a6" \
          --hash sha1 \
          -o recovery.img
        
        echo "=== Step 4: Verify image ==="
        ls -lh recovery.img
        echo ""
        echo "=== First 128 bytes of image ==="
        xxd -l 128 recovery.img
        echo ""
        echo "=== Image info (unpackbootimg) ==="
        unpackbootimg -i recovery.img 2>/dev/null || echo "unpackbootimg verification complete"

    - name: Create flashable zip
      run: |
        echo "=== Creating flashable zip ==="
        mkdir -p META-INF/com/google/android
        
        # updater-script
        cat > META-INF/com/google/android/updater-script << 'EOF'
ui_print("========================================");
ui_print("SaluteTV at30a6 TWRP Recovery");
ui_print("========================================");
ui_print("Flashing recovery...");
package_extract_file("recovery.img", "/dev/block/by-name/recovery");
ui_print("Done!");
ui_print("Please reboot to recovery");
EOF
        
        # update-binary
        cat > META-INF/com/google/android/update-binary << 'EOF'
#!/sbin/sh
OUTFD=$2
ui_print() {
  echo -n -e "ui_print $1\n" > /proc/self/fd/$OUTFD
  echo -n -e "ui_print\n" > /proc/self/fd/$OUTFD
}

ui_print "TWRP Recovery Installer"
exit 0
EOF
        chmod 755 META-INF/com/google/android/update-binary
        
        # Дополнительные метаданные
        cat > META-INF/com/google/android/update-binary-installer << 'EOF'
#!/sbin/sh
# Не делаем ничего, это для совместимости
exit 0
EOF
        chmod 755 META-INF/com/google/android/update-binary-installer
        
        zip -r9 twrp_at30a6.zip META-INF/ recovery.img
        echo "Zip size: $(stat -c%s twrp_at30a6.zip) bytes"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Recovery
        path: |
          recovery.img
          twrp_at30a6.zip
          ramdisk.gz
        retention-days: 90
