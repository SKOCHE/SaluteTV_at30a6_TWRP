name: Recovery Build for SaluteTV AT30A6

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'TWRP manifest URL'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'
      MANIFEST_BRANCH:
        description: 'TWRP manifest branch'
        required: true
        default: 'twrp-12.1'
      DEVICE_TREE_URL:
        description: 'Device tree repository URL'
        required: true
        default: 'https://github.com/SKOCHE/SaluteTV_at30a6_TWRP'
      DEVICE_TREE_BRANCH:
        description: 'Device tree branch'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'Device path in device tree'
        required: true
        default: 'device/salute/at30a6'
      COMMON_TREE_URL:
        description: 'Common tree URL (if exists)'
        required: false
      COMMON_PATH:
        description: 'Common tree path (if exists)'
        required: false
      DEVICE_NAME:
        description: 'Device name'
        required: true
        default: 'at30a6'
      MAKEFILE_NAME:
        description: 'Makefile name'
        required: true
        default: 'twrp_at30a6'
      BUILD_TARGET:
        description: 'Build target'
        required: true
        default: 'recovery'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Display Run Parameters
      run: |
        echo "::group::Build Parameters"
        echo "Manifest URL: ${{ github.event.inputs.MANIFEST_URL }}"
        echo "Manifest Branch: ${{ github.event.inputs.MANIFEST_BRANCH }}"
        echo "Device Tree URL: ${{ github.event.inputs.DEVICE_TREE_URL }}"
        echo "Device Tree Branch: ${{ github.event.inputs.DEVICE_TREE_BRANCH }}"
        echo "Device Path: ${{ github.event.inputs.DEVICE_PATH }}"
        echo "Device Name: ${{ github.event.inputs.DEVICE_NAME }}"
        echo "Makefile Name: ${{ github.event.inputs.MAKEFILE_NAME }}"
        echo "Build Target: ${{ github.event.inputs.BUILD_TARGET }}.img"
        echo "::endgroup::"

    - name: Check Out
      uses: actions/checkout@v3

    - name: Prepare the environment for Ubuntu 22.04
      run: |
        sudo apt update
        sudo apt -y upgrade
        sudo apt -y install git gperf build-essential gcc-multilib ccache chrpath gawk flex bison python3 \
          libncurses5-dev x11proto-core-dev libx11-dev libgl1-mesa-dev \
          zip lzop pngcrush imagemagick libbz2-dev rsync bc \
          openjdk-8-jdk libxml2-utils xsltproc

    - name: Install OpenJDK 8
      run: |
        sudo apt-get install openjdk-8-jdk -y
        java -version

    - name: Setup SSH Keys
      if: ${{ startsWith(github.event.inputs.MANIFEST_URL, 'git@github.com') }}
      uses: webfactory/ssh-agent@v0.5.4
      with:
          ssh-private-key: |
              ${{ secrets.SSH_PRIVATE_KEY }}                                            
    - name: Install repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize repo
      run: |
        mkdir workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
        git config --global user.name "Nico170420"
        git config --global user.email "b170420nc@gmail.com"
        repo init --depth=1 -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }}
      id: pwd

    - name: Repo Sync
      run: |
        repo sync -j$(nproc --all) --force-sync
      working-directory: workspace

    - name: Clone device tree
      run: |
                                                                               
                                                                           
        git clone ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.DEVICE_PATH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Clone common tree
      if: |
        github.event.inputs.COMMON_TREE_URL != null
        && github.event.inputs.COMMON_PATH != null
      run: |
        git clone ${{ github.event.inputs.COMMON_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.COMMON_PATH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Check Build Tree
      uses: haya14busa/action-cond@v1
      id: buildtree
      with:
        cond: ${{ github.event.inputs.MANIFEST_BRANCH == 'twrp-11' || github.event.inputs.MANIFEST_BRANCH == 'twrp-12.1' }}
        if_true: twrp
        if_false: omni

    - name: Sync Device Dependencies
      run: |
                                                                
        bash ${GITHUB_WORKSPACE}/scripts/convert.sh ${{ github.event.inputs.DEVICE_PATH }}/${{ steps.buildtree.outputs.value }}.dependencies
        repo sync -j$(nproc --all)
            
                                                                       
          
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      continue-on-error: true

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Building recovery
      run: |
                    
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
                       
        
                                   
                                                                   
                                  
                    
                                                                         
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng && make clean && make ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
                                                     
                                                              
                                   
                                                        
                                                          
                    
                                                                            
          

                              
            
                                                
                    
                                                                                                                               
                                                                            
                                                                                                                        
            
                                                                              
                                                
                                                               
          

    - name: Upload to Release
                   
      uses: softprops/action-gh-release@v1
      with:
        files: workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_TARGET }}.img
        name: ${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
                                           
          
                           
          Manifest: ${{ github.event.inputs.MANIFEST_BRANCH }}
          Device: ${{ github.event.inputs.DEVICE_NAME }}
          Target: ${{ github.event.inputs.BUILD_TARGET }}.img
                                                                   
          
                                  
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Recovery Build for SaluteTV AT30A6

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'TWRP manifest URL'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'
      MANIFEST_BRANCH:
        description: 'TWRP manifest branch'
        required: true
        default: 'twrp-11'
      DEVICE_TREE_URL:
        description: 'Device tree repository URL'
        required: true
        default: 'https://github.com/SKOCHE/SaluteTV_at30a6_TWRP'
      DEVICE_TREE_BRANCH:
        description: 'Device tree branch'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'Device path in device tree'
        required: true
        default: 'device/salute/at30a6'
      DEVICE_NAME:
        description: 'Device name'
        required: true
        default: 'at30a6'
      MAKEFILE_NAME:
        description: 'Makefile name'
        required: true
        default: 'twrp_at30a6'
      BUILD_TARGET:
        description: 'Build target'
        required: true
        default: 'recovery'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    # Add cleanup of previous builds or temporary files using custom composite action
    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: Setup Dependencies
      run: |
        sudo apt update && sudo apt upgrade -y
        sudo apt install -y git gperf build-essential gcc-multilib g++-multilib lib32z-dev lib32ncurses5-dev libxml2-utils xsltproc bc ccache liblz4-tool libncurses5-dev lzop imagemagick libbz2-dev python3 curl libssl-dev libreadline-dev zlib1g-dev
        sudo apt-get autoremove -y
        sudo apt-get clean

    - name: Install Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '8'

    - name: Download Repo Tool
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod +x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize Repo
      run: |
        mkdir workspace
        cd workspace
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        repo init --depth=1 -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }} --groups=default,-darwin,-mips,-x86,-notdefault

    - name: Sync Repo
      run: |
        cd workspace
        repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
        find . -name ".git" -type d -prune -exec rm -rf {} \; 2>/dev/null || true
        rm -rf .repo/projects/*.git
        rm -rf .repo/project-objects

    - name: Clone Device Tree
      run: |
        git clone ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} workspace/${{ github.event.inputs.DEVICE_PATH }}

    - name: Optimize Disk Usage
      run: |
        sudo apt-get autoremove -y
        sudo apt-get clean
        sudo rm -rf /var/cache/apt/* /var/lib/apt/lists/*

    - name: Fix Source Code Error
      run: |
        cd workspace
        sed -i 's/DTW_USE_KEY_CODE_TOUCH_SYNC=0/-DDTW_USE_KEY_CODE_TOUCH_SYNC=0/g' bootable/recovery/gui/Android.bp
        echo "Compilation error fixed."

    - name: Configure Environment
      run: |
        cd workspace
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        export USE_CCACHE=1
        export CCACHE_COMPRESS=1
        export CCACHE_DIR=/tmp/ccache
        ccache -M 2G
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng

    - name: Build Image
      run: |
        cd workspace
        make clean
        make ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)

    - name: Verify Output
      run: |
        cd workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}
        if [ -f "${{ github.event.inputs.BUILD_TARGET }}.img" ]; then
          echo "Build successful!"
          ls -lh "${{ github.event.inputs.BUILD_TARGET }}.img"
          gzip -k "${{ github.event.inputs.BUILD_TARGET }}.img"
        else
          echo "Build failed - no image found"
          exit 1
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_TARGET }}.img
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_TARGET }}.img.gz
        name: ${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          TWRP Recovery for SaluteTV AT30A6
          Manifest: ${{ github.event.inputs.MANIFEST_BRANCH }}
          Device: ${{ github.event.inputs.DEVICE_NAME }}
          Target: ${{ github.event.inputs.BUILD_TARGET }}.img
          Build Date: ${{ github.event.created_at }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
