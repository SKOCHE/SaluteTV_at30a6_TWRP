name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      device_codename:
        description: 'Device codename'
        required: true
        default: 'at30a6'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
    # Шаг 1: Установка зависимостей
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git openjdk-17-jdk ccache python3 \
          gcc-multilib g++-multilib libc6-dev libncurses-dev \
          libxml2-utils xsltproc bc bison flex curl lzop \
          pngcrush squashfs-tools zip unzip
        
    # Шаг 2: Установка repo
    - name: Install repo tool
      run: |
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
        chmod a+x ~/repo
        sudo mv ~/repo /usr/local/bin/

    # Шаг 3: Инициализация TWRP
    - name: Initialize TWRP source
      run: |
        mkdir twrp
        cd twrp
        /usr/local/bin/repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git \
          -b twrp-12.1 \
          --depth=1
        /usr/local/bin/repo sync -c -j2 --no-tags --no-clone-bundle

    # Шаг 4: Копирование дерева устройства
    - name: Copy device tree
      run: |
        mkdir -p twrp/device/salute/${{ github.event.inputs.device_codename }}
        # Копируем ВСЁ
        cp -r * twrp/device/salute/${{ github.event.inputs.device_codename }}/ 2>/dev/null || true
        cp -r .* twrp/device/salute/${{ github.event.inputs.device_codename }}/ 2>/dev/null || true

    # Шаг 5: Исправление libbinder
    - name: Fix libbinder error
      run: |
        cd twrp
        sed -i '/version_script: "libbinder.map.txt"/d' frameworks/native/libs/binder/Android.bp 2>/dev/null || true

    # Шаг 6: Прямая сборка БЕЗ lunch
    - name: Build recovery directly
      run: |
        cd twrp
        
        # Экспорт переменных
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        export TARGET_DEVICE=${{ github.event.inputs.device_codename }}
        export TARGET_PRODUCT=twrp_${{ github.event.inputs.device_codename }}
        
        # Инициализация окружения
        source build/envsetup.sh
        
        # Вместо lunch устанавливаем переменные напрямую
        export TARGET_BUILD_VARIANT=eng
        export TARGET_BUILD_TYPE=release
        
        echo "=== Собираю recoveryimage ==="
        make -j2 recoveryimage
        
    # Шаг 7: Загрузка
    - name: Upload recovery image
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: recovery-${{ github.event.inputs.device_codename }}
        path: twrp/out/target/product/${{ github.event.inputs.device_codename }}/recovery.img
