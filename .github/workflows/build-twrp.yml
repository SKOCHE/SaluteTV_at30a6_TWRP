name: Recovery Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'MANIFEST_URL'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'
      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH'
        required: true
        default: 'twrp-12.1'
      DEVICE_TREE_URL:
        description: 'DEVICE_TREE_URL'
        required: true
        default: 'https://github.com/SKOCHE/SaluteTV_at30a6_TWRP'
      DEVICE_TREE_BRANCH:
        description: 'DEVICE_TREE_BRANCH'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'DEVICE_PATH'
        required: true
        default: 'device/salute/at30a6'
      COMMON_TREE_URL:
        description: 'COMMON_TREE_URL (if no common tree, leave blank)'
        required: false
      COMMON_PATH:
        description: 'COMMON_PATH (if no common tree, leave blank)'
        required: false
      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
        default: 'at30a6'
      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME'
        required: true
        default: 'twrp_at30a6'
      BUILD_TARGET:
        description: 'BUILD_TARGET'
        required: true
        default: 'recovery'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: write
      
    steps:
    - name: Display Run Parameters
      run: |
        echo "Manifest URL: ${{ github.event.inputs.MANIFEST_URL }}"
        echo "Manifest Branch: ${{ github.event.inputs.MANIFEST_BRANCH }}"
        echo "Device Tree URL: ${{ github.event.inputs.DEVICE_TREE_URL }}"
        echo "Device Tree Branch: ${{ github.event.inputs.DEVICE_TREE_BRANCH }}"
        echo "Device Path: ${{ github.event.inputs.DEVICE_PATH }}"
        echo "Device Name: ${{ github.event.inputs.DEVICE_NAME }}"
        echo "Makefile Name: ${{ github.event.inputs.MAKEFILE_NAME }}"
        echo "Build Target: ${{ github.event.inputs.BUILD_TARGET }}.img"

    - name: Checkout device tree
      uses: actions/checkout@v4
      with:
        path: device_tree

    - name: Prepare environment
      run: |
        sudo apt update
        sudo apt install -y gperf gcc-multilib g++-multilib libc6-dev \
          lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev \
          libgl1-mesa-dev libxml2-utils xsltproc bc ccache lib32readline-dev \
          lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev \
          libwxgtk3.0-gtk3-dev lzop pngcrush schedtool squashfs-tools python3 \
          git-core gnupg flex bison build-essential zip curl zlib1g-dev repo

    - name: Install OpenJDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Initialize repo workspace
      run: |
        mkdir -p workspace
        cd workspace
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        repo init --depth=1 -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }}

    - name: Repo Sync
      run: |
        cd workspace
        repo sync -c -j$(nproc) --no-tags --no-clone-bundle --force-sync

    - name: Fix BoardConfig.mk to avoid mkbootimg.mk error
      run: |
        cd workspace/${{ github.event.inputs.DEVICE_PATH }}
        # Убедимся, что BOARD_MKBOOTIMG_ARGS не ссылается на несуществующий файл
        if grep -q "mkbootimg.mk" BoardConfig.mk; then
          echo "Fixing mkbootimg.mk reference..."
          sed -i '/mkbootimg\.mk/d' BoardConfig.mk
        fi
        # Явно задаем BOARD_MKBOOTIMG_ARGS, если его нет
        if ! grep -q "BOARD_MKBOOTIMG_ARGS" BoardConfig.mk; then
          echo "Adding BOARD_MKBOOTIMG_ARGS..."
          echo "" >> BoardConfig.mk
          echo "# Boot image creation args" >> BoardConfig.mk
          echo "BOARD_MKBOOTIMG_ARGS := --kernel_offset 0x1080000 --ramdisk_offset 0x1000000" >> BoardConfig.mk
          echo "# Для Amlogic обычно нужны специфичные аргументы" >> BoardConfig.mk
        fi

    - name: Copy device tree to workspace
      run: |
        mkdir -p workspace/${{ github.event.inputs.DEVICE_PATH }}
        cp -r device_tree/* workspace/${{ github.event.inputs.DEVICE_PATH }}/

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 8

    - name: Build recovery
      run: |
        cd workspace
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        
        source build/envsetup.sh
        
        # Пробуем оба варианта
        if lunch ${{ github.event.inputs.MAKEFILE_NAME }}-userdebug; then
          echo "Building userdebug variant"
        else
          lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng
        fi
        
        make clean
        make ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc)

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: recovery-${{ github.event.inputs.DEVICE_NAME }}
        path: |
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_TARGET }}.img
          workspace/build.log

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        files: workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_TARGET }}.img
        name: "TWRP ${{ github.event.inputs.DEVICE_NAME }}"
        tag_name: "build-${{ github.run_number }}"
        body: |
          TWRP Recovery for ${{ github.event.inputs.DEVICE_NAME }}
          
          Built on: $(date)
          Manifest: ${{ github.event.inputs.MANIFEST_BRANCH }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
