name: Build TWRP Recovery

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Ручной запуск

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180 # 3 часа максимум
    
    steps:
    - name: Checkout device tree
      uses: actions/checkout@v4
      with:
        path: device/twrp/at30a6
        fetch-depth: 0

    - name: Setup environment
      run: |
        # Установка зависимостей
        sudo apt-get update
        sudo apt-get install -y \
          git-core gnupg flex bison build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev \
          x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev \
          libxml2-utils xsltproc unzip fontconfig python3 python-is-python3 \
          openjdk-11-jdk bc lz4 mkbootimg unmkbootimg abootimg \
          libssl-dev rsync schedtool squashfs-tools imagemagick ccache
        
        # Настройка ccache для ускорения
        echo "CCACHE_DIR=/tmp/ccache" >> $GITHUB_ENV
        echo "USE_CCACHE=1" >> $GITHUB_ENV
        echo "CCACHE_EXEC=$(which ccache)" >> $GITHUB_ENV
        echo "CCACHE_SIZE=20G" >> $GITHUB_ENV
        ccache -M 20G
        
        # Создание симлинка python -> python3
        sudo ln -sf /usr/bin/python3 /usr/bin/python

    - name: Initialize TWRP source
      run: |
        # Скачивание TWRP манифеста
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git \
          -b twrp-13 \
          --depth=1
        
        # Синхронизация репозиториев (только необходимое)
        repo sync -c -j$(nproc --all) \
          --force-sync \
          --no-clone-bundle \
          --no-tags \
          --optimized-fetch \
          --prune
        
        # Копирование device tree на правильное место
        mkdir -p device/twrp/
        cp -r device/twrp/at30a6 device/twrp/at30a6/
        
        # Убедимся, что пребилты на месте
        if [ -f "device/twrp/at30a6/prebuilt/kernel" ]; then
          echo "Kernel found, size: $(stat -c%s device/twrp/at30a6/prebuilt/kernel) bytes"
        else
          echo "ERROR: Kernel not found!"
          exit 1
        fi
        
        if [ -f "device/twrp/at30a6/prebuilt/dt.img" ]; then
          echo "DTB found, size: $(stat -c%s device/twrp/at30a6/prebuilt/dt.img) bytes"
        else
          echo "WARNING: DTB not found!"
        fi

    - name: Setup build environment
      run: |
        # Установка переменных окружения
        source build/envsetup.sh
        
        # Выбор устройства
        lunch twrp_at30a6-eng
        
        # Проверка конфигурации
        echo "========================================"
        echo "Build configuration:"
        echo "TARGET_ARCH: $TARGET_ARCH"
        echo "TARGET_DEVICE: $TARGET_DEVICE"
        echo "OUT_DIR: $OUT"
        echo "========================================"
        
        # Проверка BoardConfig.mk
        echo "Checking BoardConfig.mk values:"
        grep -E "(BOARD_KERNEL|BOARD_RAMDISK|BOARD_PAGESIZE)" device/twrp/at30a6/BoardConfig.mk || true

    - name: Build recovery image
      run: |
        # Запуск сборки (только recovery)
        mka recoveryimage -j$(nproc --all)
        
        # Проверка результата
        if [ -f "$OUT/recovery.img" ]; then
          echo "✅ SUCCESS: Recovery image built!"
          echo "File size: $(stat -c%s $OUT/recovery.img) bytes"
          echo "Location: $OUT/recovery.img"
          
          # Проверка образа
          echo "Checking image structure:"
          file $OUT/recovery.img || true
          
          # Попытка распаковать для проверки
          if command -v unpackbootimg &> /dev/null; then
            mkdir -p /tmp/test-unpack
            cd /tmp/test-unpack
            unpackbootimg -i $OUT/recovery.img -o test 2>/dev/null && echo "✅ Image can be unpacked" || echo "⚠️  Image unpacking failed"
          fi
        else
          echo "❌ ERROR: Recovery image not found!"
          ls -la $OUT/
          exit 1
        fi

    - name: Upload recovery image
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-recovery-at30a6
        path: |
          ${{ github.workspace }}/out/target/product/at30a6/recovery.img
          ${{ github.workspace }}/out/target/product/at30a6/kernel
          ${{ github.workspace }}/out/target/product/at30a6/dt.img
        retention-days: 7
        if-no-files-found: error

    - name: Create release (optional)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ github.workspace }}/out/target/product/at30a6/recovery.img
        draft: false
        prerelease: false
