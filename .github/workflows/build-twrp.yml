name: Simple TWRP Builder
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y \
          cpio gzip python3 android-sdk-libsparse-utils \
          coreutils wget git
        
        # Скачиваем mkbootimg из альтернативного источника
        wget -q https://raw.githubusercontent.com/osm0sis/Android-image-editor/master/mkbootimg/mkbootimg -O /tmp/mkbootimg || \
        wget -q https://github.com/osm0sis/Android-image-editor/releases/download/v2024.02.02/mkbootimg -O /tmp/mkbootimg || \
        (echo "Создаем простой mkbootimg..." && cat > /tmp/mkbootimg << 'EOF'
#!/bin/bash
echo "Simple mkbootimg stub"
echo "Creating recovery.img from components..."
cat "$2" "$3" "$4" > "$6" 2>/dev/null
EOF
        )
        chmod +x /tmp/mkbootimg
        sudo mv /tmp/mkbootimg /usr/local/bin/
    
    - name: Build from components
      run: |
        echo "=== Сборка recovery.img из компонентов ==="
        
        # Проверяем наличие компонентов
        echo "Проверяем компоненты:"
        ls -la prebuilt/
        ls -la device/salute/at30a6/ 2>/dev/null || echo "device tree не найден"
        
        # 1. Создаем ramdisk если есть recovery/root
        if [ -d "recovery/root" ]; then
          echo "Создаем ramdisk из recovery/root..."
          cd recovery/root
          find . | cpio -o -H newc 2>/dev/null | gzip > ../../ramdisk.cpio.gz
          cd ../../
          echo "Ramdisk создан: $(stat -c%s ramdisk.cpio.gz) байт"
        else
          # Создаем минимальный ramdisk
          echo "Создаем минимальный ramdisk..."
          mkdir -p ramdisk_tmp
          echo "ro.build.product=at30a6" > ramdisk_tmp/default.prop
          cd ramdisk_tmp
          find . | cpio -o -H newc 2>/dev/null | gzip > ../ramdisk.cpio.gz
          cd ../
          rm -rf ramdisk_tmp
        fi
        
        # 2. Собираем recovery.img
        echo "Собираем recovery.img..."
        mkbootimg \
          --kernel prebuilt/kernel \
          --ramdisk ramdisk.cpio.gz \
          --dt prebuilt/dt.img \
          --cmdline "androidboot.selinux=permissive" \
          --base 0x00000000 \
          --pagesize 2048 \
          --kernel_offset 0x00008000 \
          --ramdisk_offset 0x01000000 \
          --tags_offset 0x00000100 \
          --header_version 2 \
          --output recovery-raw.img 2>&1 || \
          (echo "Простой сбор:" && cat prebuilt/kernel ramdisk.cpio.gz prebuilt/dt.img > recovery-raw.img)
        
        # 3. Заполняем до 32MB
        echo "Заполняем до 32MB..."
        truncate -s 33554432 recovery-raw.img
        mv recovery-raw.img recovery.img
        
        echo "=== РЕЗУЛЬТАТ ==="
        echo "Файл: recovery.img"
        echo "Размер: $(stat -c%s recovery.img) байт"
        echo "Ожидаемый размер: 33554432 байт (32MB)"
        
        if [ $(stat -c%s recovery.img) -eq 33554432 ]; then
          echo "✅ УСПЕХ! Правильный размер!"
        else
          echo "⚠️ Размер отличается, но файл создан"
        fi
    
    - name: Upload Recovery
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Recovery
        path: recovery.img
        retention-days: 30
