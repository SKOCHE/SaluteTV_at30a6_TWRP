name: SaluteTV TWRP Build

on:
  workflow_dispatch:
    inputs:
      TWRP_BRANCH:
        description: 'TWRP Branch'
        required: true
        default: 'twrp-13'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      with:
        repository: SKOCHE/SaluteTV_at30a6_TWRP
        path: device-tree
      
    - name: Build TWRP
      run: |
        # Минимальная сборка
        mkdir -p workspace result
        
        echo "🚀 Сборка TWRP для at30a6"
        
        docker run --rm \
          -v "$(pwd)/device-tree:/device-tree:ro" \
          -v "$(pwd)/workspace:/workspace" \
          -v "$(pwd)/result:/result" \
          -e TWRP_BRANCH="${{ github.event.inputs.TWRP_BRANCH }}" \
          -e DEVICE_LIST="at30a6" \
          -e BRANCH_NAME="${{ github.event.inputs.TWRP_BRANCH }}" \
          --entrypoint /bin/bash \
          lineageos4microg/docker-lineage-cicd:latest \
          -c "
            echo '1. Проверка дерева устройств...'
            find /device-tree -name '*.mk' | head -5
            
            echo '2. Копирование дерева устройств...'
            mkdir -p /srv/src/device/salute/
            cp -r /device-tree /srv/src/device/salute/at30a6
            
            echo '3. Запуск сборки...'
            cd /srv/src
            
            # Используем скрипт из контейнера
            source /root/new_build.sh
          "
        
    - name: Проверка результата
      run: |
        echo "📁 Проверка workspace:"
        find workspace -name "*.img" 2>/dev/null | head -10
        
        echo "📁 Проверка result:"
        ls -la result/ 2>/dev/null || echo "result пуст"
        
        if [ -f "result/recovery.img" ]; then
          echo "✅ Успех!"
          ls -lh result/recovery.img
        else
          echo "❌ recovery.img не найден"
          exit 1
        fi

    - name: Загрузка артефакта
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: twrp-at30a6
        path: result/recovery.img
