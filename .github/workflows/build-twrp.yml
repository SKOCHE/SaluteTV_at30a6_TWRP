name: Build TWRP

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      with:
        path: device_tree

    - name: Setup Build Environment
      run: |
        # 1. Клонируем минимальный манифест TWRP
        git clone https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git twrp_build -b twrp-12.1 --depth=1
        cd twrp_build
        
        # 2. Создаем правильный путь для устройства
        mkdir -p device/salute
        cp -r ../device_tree device/salute/at30a6
        
        # 3. Инициализируем и синхронизируем (это может занять время)
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1
        repo sync -c -j$(nproc) --no-tags --no-clone-bundle

    - name: Build Recovery
      run: |
        cd twrp_build
        # Критически важные переменные окружения
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        
        source build/envsetup.sh
        lunch twrp_at30a6-userdebug
        
        # Собираем только recovery
        mka recoveryimage

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Recovery-at30a6
        path: |
          twrp_build/out/target/product/at30a6/recovery.img
          twrp_build/out/target/product/at30a6/recovery.log
        retention-days: 7
