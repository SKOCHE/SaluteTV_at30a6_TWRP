name: Build TWRP

on:
  workflow_dispatch:
    inputs:
      device_name:
        description: 'Device codename'
        required: true
        default: 'at30a6'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git openjdk-11-jdk python3 ccache \
          gcc-multilib g++-multilib libc6-dev libncurses5 \
          libxml2-utils xsltproc bc bison flex curl lzop \
          pngcrush schedtool squashfs-tools zip unzip
        
    - name: Install repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod +x ~/bin/repo
        sudo mv ~/bin/repo /usr/local/bin/
        
    - name: Get TWRP source
      run: |
        mkdir twrp && cd twrp
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11 --depth=1
        repo sync -c -j2 --no-clone-bundle
        
    - name: Copy device tree
      run: |
        mkdir -p twrp/device/salute/${{ github.event.inputs.device_name }}
        # Копируем всё кроме .git
        find . -maxdepth 1 -name "*" ! -name ".git" -exec cp -r {} twrp/device/salute/${{ github.event.inputs.device_name }}/ \;
        
    - name: Build
      run: |
        cd twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch twrp_${{ github.event.inputs.device_name }}-eng || lunch omni_${{ github.event.inputs.device_name }}-eng
        make recoveryimage -j2
        
    - name: Upload
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: recovery
        path: twrp/out/target/product/${{ github.event.inputs.device_name }}/recovery.img
