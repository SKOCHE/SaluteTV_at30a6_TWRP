name: Build TWRP from components
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y \
          cpio gzip python3 android-sdk-libsparse-utils \
          coreutils
    
    - name: Download mkbootimg
      run: |
        # Скачиваем готовый mkbootimg
        wget -q https://github.com/osm0sis/mkbootimg/releases/download/2024.02.02/mkbootimg -O mkbootimg
        chmod +x mkbootimg
        sudo mv mkbootimg /usr/local/bin/
    
    - name: Build recovery.img from components
      run: |
        echo "=== Сборка recovery.img из компонентов ==="
        
        # Создаем ramdisk из готовых файлов TWRP
        if [ -d "recovery/root" ]; then
          echo "Создаем ramdisk из recovery/root..."
          cd recovery/root
          find . | cpio -o -H newc | gzip > ../../ramdisk.cpio.gz
          cd ../../
        fi
        
        # Проверяем компоненты
        echo "Компоненты:"
        ls -lh prebuilt/kernel
        ls -lh prebuilt/dt.img
        ls -lh ramdisk.cpio.gz 2>/dev/null || echo "ramdisk не найден"
        
        # Собираем образ
        mkbootimg \
          --kernel prebuilt/kernel \
          --ramdisk ramdisk.cpio.gz \
          --dt prebuilt/dt.img \
          --cmdline "androidboot.selinux=permissive" \
          --base 0x00000000 \
          --pagesize 2048 \
          --kernel_offset 0x00008000 \
          --ramdisk_offset 0x01000000 \
          --tags_offset 0x00000100 \
          --header_version 2 \
          --output recovery-raw.img
        
        # Заполняем до 32MB
        truncate -s 33554432 recovery-raw.img
        mv recovery-raw.img recovery.img
        
        echo "✅ Готово! Размер: $(stat -c%s recovery.img) байт"
    
    - name: Upload recovery
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-32MB
        path: recovery.img
