name: Build Recovery

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y \
          mkbootimg \
          abootimg \
          cpio \
          gzip
        
    - name: Create recovery image
      run: |
        # Проверяем наличие пребилтов
        echo "Checking prebuilt files:"
        ls -la prebuilt/ || echo "No prebuilt directory"
        
        # Создаем минимальный ramdisk
        mkdir -p ramdisk
        cat > ramdisk/init.rc << 'EOF'
        on early-init
            start ueventd
        
        service ueventd /sbin/ueventd
            class core
            critical
        EOF
        
        # Упаковываем
        (cd ramdisk && find . | cpio -o -H newc | gzip -9 > ../ramdisk.gz)
        
        # Если есть kernel, создаем образ
        if [ -f "prebuilt/kernel" ]; then
          mkbootimg \
            --kernel prebuilt/kernel \
            --ramdisk ramdisk.gz \
            --pagesize 2048 \
            --base 0xffff8000 \
            --kernel_offset 0x00008000 \
            --ramdisk_offset 0x01088000 \
            --output recovery.img
          
          echo "✅ Image created: $(ls -lh recovery.img)"
        else
          echo "❌ No kernel found"
        fi
    
    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: recovery
        path: recovery.img
