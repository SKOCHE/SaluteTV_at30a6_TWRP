name: Recovery Build

on:
  workflow_dispatch:
    inputs:
      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
        default: 'at30a6'
      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME'
        required: true
        default: 'twrp_at30a6'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    permissions:
      contents: write
      
    steps:
    - name: Check Out Device Tree
      uses: actions/checkout@v4

    - name: Cleanup Workspace
      uses: rokibhasansagar/slimhub_actions@main

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y gperf gcc-multilib g++-multilib libc6-dev \
          lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev \
          libgl1-mesa-dev libxml2-utils xsltproc bc ccache lib32readline-dev \
          lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev \
          libwxgtk3.0-gtk3-dev lzop pngcrush schedtool squashfs-tools python3 \
          git-core gnupg flex bison build-essential zip curl zlib1g-dev rsync

    - name: Install OpenJDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install repo tool
      run: |
        mkdir -p ~/bin
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo cp ~/bin/repo /usr/bin/repo

    - name: Initialize TWRP Source
      run: |
        mkdir -p twrp_build
        cd twrp_build
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp -b twrp-12.1

    - name: Sync Source Code
      run: |
        cd twrp_build
        repo sync -c -j2 --no-tags --no-clone-bundle --force-sync

    - name: Apply libbinder Patch
      run: |
        cd twrp_build
        echo "=== Применяем патч для libbinder ==="
        
        # Создаем патч для frameworks/native/libs/binder/Android.bp
        cat > libbinder_fix.patch << 'PATCHEOF'
--- a/frameworks/native/libs/binder/Android.bp
+++ b/frameworks/native/libs/binder/Android.bp
@@ -146,7 +146,7 @@
         "-Wno-missing-field-initializers",
     ],
 
-    version_script: "libbinder.map.txt",
+    # version_script: "libbinder.map.txt",  # Комментируем проблемную строку
 
     sanitize: {
         misc_undefined: ["integer"],
PATCHEOF
        
        # Пробуем применить патч
        patch -p1 -f < libbinder_fix.patch || echo "Патч не применен, возможно уже исправлено"
        
        # Альтернативный способ - просто отключить version_script
        sed -i 's/version_script: "libbinder.map.txt",/# version_script: "libbinder.map.txt",/' frameworks/native/libs/binder/Android.bp 2>/dev/null || true

    - name: Copy Device Tree
      run: |
        echo "=== Копирование дерева устройства ==="
        mkdir -p twrp_build/device/salute/at30a6
        
        # Копируем всё кроме .git и yml файлов
        rsync -av --progress \
          --exclude='.git' \
          --exclude='twrp_build' \
          --exclude='*.yml' \
          --exclude='*.yaml' \
          ./ twrp_build/device/salute/at30a6/
        
        # Проверяем, что скопировалось
        cd twrp_build/device/salute/at30a6
        echo "=== Содержимое директории устройства ==="
        ls -la
        
        # Если нет recovery.fstab, создаем из twrp.flags
        if [ ! -f "recovery.fstab" ]; then
          echo "=== Создание recovery.fstab ==="
          if [ -f "recovery/root/system/etc/twrp.flags" ]; then
            echo "Создаю recovery.fstab из twrp.flags"
            cp recovery/root/system/etc/twrp.flags recovery.fstab
          elif [ -f "fstab.amlogic" ]; then
            echo "Создаю recovery.fstab из fstab.amlogic"
            cp fstab.amlogic recovery.fstab
          fi
        fi
        
        echo "=== Проверка необходимых файлов ==="
        ls -la *.mk recovery.fstab 2>/dev/null || echo "Некоторые файлы отсутствуют"

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Build Recovery
      run: |
        cd twrp_build
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        
        echo "=== Начало сборки ==="
        source build/envsetup.sh
        lunch twrp_at30a6-eng
        make clean
        
        # Пробуем собрать с меньшим количеством потоков
        echo "=== Компиляция recoveryimage ==="
        make recoveryimage -j1

    - name: Upload Recovery Image
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: recovery-at30a6
        path: twrp_build/out/target/product/at30a6/recovery.img

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        files: twrp_build/out/target/product/at30a6/recovery.img
        name: "TWRP at30a6"
        tag_name: "build-${{ github.run_number }}"
        body: |
          TWRP Recovery for SaluteTV at30a6
          Built: $(date)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
