name: FIND Existing Recovery
on: workflow_dispatch
jobs:
  find:
    runs-on: ubuntu-22.04
    timeout-minutes: 2
    steps:
    - uses: actions/checkout@v4
    
    - name: Search in twrp directory
      run: |
        echo "=== ПОИСК УЖЕ СОБРАННОГО RECOVERY ==="
        
        if [ -d "twrp" ]; then
          echo "✅ Найдена папка twrp от предыдущей сборки"
          cd twrp
          
          # 1. Показываем структуру
          echo ""
          echo "Содержимое out/target/product/:"
          ls -la out/target/product/ 2>/dev/null || echo "Папка product не найдена"
          
          # 2. Ищем ВСЕ .img файлы
          echo ""
          echo "ВСЕ найденные .img файлы:"
          find . -type f -name "*.img" 2>/dev/null | while read img; do
            SIZE=$(ls -lh "$img" | awk '{print $5}')
            echo "📁 $img ($SIZE)"
          done
          
          # 3. Копируем recovery.img если нашли
          find . -type f -name "recovery.img" 2>/dev/null | head -1 | while read img; do
            echo ""
            echo "🎉 НАЙДЕН recovery.img: $img"
            cp "$img" ../recovery_found.img
            echo "Скопирован как recovery_found.img"
            ls -lh ../recovery_found.img
          done
        else
          echo "❌ Папка twrp не найдена"
          echo "Похоже предыдущая сборка не сохранилась"
        fi
    
    - name: Upload found recovery
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Found-Recovery
        path: |
          recovery_found.img
          twrp/out/**/*.img
        if-no-files-found: ignore
