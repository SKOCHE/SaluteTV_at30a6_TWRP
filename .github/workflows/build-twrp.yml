name: TWRP Build

on:
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Set up SSH Agent
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.VENDOR_SALUTE_DEPLOY_KEY }} # Use the deploy key secret

    - name: Checkout Device Tree Repository
      uses: actions/checkout@v4
      with:
        repository: SKOCHE/SaluteTV_at30a6_TWRP
        path: device/skoche/at30a6

    - name: Checkout Vendor Repository
      uses: actions/checkout@v4
      with:
        repository: SKOCHE/vendor_salute_at30a6
        path: vendor/salute/at30a6

    - name: Set up Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libwxgtk3.0-gtk3-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev openjdk-11-jdk python3 python3-pip
        sudo pip3 install psutil

    - name: Set CCACHE
      run: |
        echo "CCACHE_DIR=$GITHUB_WORKSPACE/ccache" >> $GITHUB_ENV
        mkdir -p $GITHUB_WORKSPACE/ccache
        ccache -M 50G # Set cache size to 50GB
        ccache -o compression=true
        ccache -o hash_dir=true

    - name: Repo init
      run: |
        mkdir twrp
        cd twrp
        git config --global user.email "youremail@example.com"
        git config --global user.name "Your Name"
        repo init --depth=1 -u https://android.googlesource.com/platform/manifest -b android-11.0.0_r39 # Android 11 as per your repo

    - name: Repo Sync
      run: |
        cd twrp
        repo sync -j$(nproc --all) --force-sync

    - name: Clean up AFTER Repo Sync (Aggressive - Customize this!)
      run: |
        cd twrp
        sudo rm -rf packages/apps/*    # Remove app sources.
        sudo rm -rf packages/modules/*    # Remove module sources.
        sudo rm -rf system/bt/* # Remove bluetooth stack (likely not needed)

    - name: TWRP Build
      run: |
        cd twrp
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch twrp_at30a6-eng # Target based on device name
        make clean
        make recoveryimage

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: twrp-recovery
        path: twrp/out/target/product/at30a6/recovery.img
