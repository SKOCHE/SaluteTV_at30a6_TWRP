name: SaluteTV TWRP Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'TWRP Manifest URL'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'
      MANIFEST_BRANCH:
        description: 'TWRP Branch'
        required: true
        default: 'twrp-13'
      DEVICE_TREE_URL:
        description: 'Device Tree URL'
        required: true
        default: 'https://github.com/SKOCHE/SaluteTV_at30a6_TWRP'
      DEVICE_TREE_BRANCH:
        description: 'Device Tree Branch'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'Device Path'
        required: true
        default: 'device/salute/at30a6'
      DEVICE_NAME:
        description: 'Device Codename'
        required: true
        default: 'at30a6'
      MAKEFILE_NAME:
        description: 'Makefile Name'
        required: true
        default: 'twrp_at30a6'
      BUILD_TARGET:
        description: 'Build Target'
        required: true
        default: 'recovery'

jobs:
  build:
    runs-on: ubuntu-24.04  # Используем Ubuntu 24.04 напрямую
    permissions:
      contents: write
    steps:
    - name: Display Build Info
      run: |
        echo "🧱 Building TWRP for SaluteTV (at30a6)"
        echo "📦 Manifest: ${{ github.event.inputs.MANIFEST_BRANCH }}"
        echo "🌲 Device Tree: ${{ github.event.inputs.DEVICE_TREE_URL }}"
        echo "📁 Device: ${{ github.event.inputs.DEVICE_NAME }}"
        echo "🛠️ Make: ${{ github.event.inputs.MAKEFILE_NAME }}-eng"

    - name: Skip Kernel Updates (оптимизация)
      run: |
        # Пропускаем обновление ядра для экономии времени
        sudo apt-mark hold linux-azure linux-image-azure linux-headers-azure
        echo "✅ Kernel updates skipped"

    - name: Install Essential Packages (Ubuntu 24.04)
      run: |
        # БЕЗ sudo apt update и upgrade - экономия времени!
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
          git git-lfs gnupg gperf imagemagick libncurses-dev \
          liblz4-tool libsdl1.2-dev libssl-dev \
          libwxgtk3.2-dev libxml2 libxml2-utils lzop m4 \
          pngcrush python3 python3-pip repo rsync schedtool squashfs-tools \
          xsltproc zip zlib1g-dev \
          lib32stdc++6 lib32z1 libelf-dev \
          openjdk-11-jdk \
          # Для 32-битной сборки
          libc6-dev-i386 lib32gcc-s1
        
        # Устанавливаем repo tool
        mkdir -p ~/bin
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo cp ~/bin/repo /usr/local/bin/

    - name: Setup Workspace
      run: |
        mkdir -p twrp-build
        cd twrp-build
        echo "WORKSPACE=$(pwd)" >> $GITHUB_ENV
        
        # Настройка git
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git config --global color.ui false

    - name: Initialize TWRP Manifest
      run: |
        cd $WORKSPACE
        repo init -u ${{ github.event.inputs.MANIFEST_URL }} \
                  -b ${{ github.event.inputs.MANIFEST_BRANCH }} \
                  --depth=1

    - name: Sync TWRP Sources
      run: |
        cd $WORKSPACE
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
        echo "✅ Sources synced"

    - name: Clone Device Tree
      run: |
        cd $WORKSPACE
        echo "🌲 Cloning device tree..."
        rm -rf ${{ github.event.inputs.DEVICE_PATH }}
        git clone ${{ github.event.inputs.DEVICE_TREE_URL }} \
                  -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} \
                  --depth=1 \
                  ${{ github.event.inputs.DEVICE_PATH }}
        echo "✅ Device tree cloned"

    - name: Setup CCACHE
      run: |
        export USE_CCACHE=1
        export CCACHE_EXEC=/usr/bin/ccache
        ccache -M 20G
        ccache -s

    - name: Build TWRP Recovery
      timeout-minutes: 60
      run: |
        cd $WORKSPACE
        
        # Настройка окружения
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        export USE_CCACHE=1
        
        # Запуск сборки (прямой вызов mka)
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng
        mka recoveryimage -j$(nproc --all)
        
        # Проверка результата
        echo "📊 Build completed!"
        echo "📁 Output files:"
        ls -lh out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery.img 2>/dev/null || echo "❌ Recovery not found"

    - name: Check Build Output
      if: always()
      run: |
        cd $WORKSPACE
        if [ -f "out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery.img" ]; then
          echo "✅ SUCCESS: Recovery image built!"
          echo "📏 Size: $(ls -lh out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery.img | awk '{print $5}')"
        else
          echo "❌ FAILED: Recovery image not found"
          echo "🔍 Build logs:"
          find . -name "*.log" -type f | head -5
        fi

    - name: Upload Recovery Image
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: twrp-salutetv-at30a6
        path: ${{ env.WORKSPACE }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery.img
        retention-days: 30

    - name: Create GitHub Release
      if: success()
      uses: ncipollo/release-action@v1
      with:
        artifacts: ${{ env.WORKSPACE }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery.img
        name: "TWRP for SaluteTV (at30a6)"
        tag: "build-${{ github.run_number }}"
        body: |
          ### 📱 TWRP Recovery for SaluteTV (at30a6)
          
          **Device:** SaluteTV  
          **Codename:** at30a6  
          **Android:** 13  
          **Architecture:** ARM 32-bit  
          
          ### 📦 Installation
          ```bash
          fastboot flash recovery recovery.img
          fastboot flash dtbo dtbo.img
          fastboot reboot recovery
          ```
          
          ### 🔧 Build Info
          - **Build Date:** $(date -u +'%Y-%m-%d %H:%M UTC')
          - **Workflow:** #${{ github.run_number }}
        token: ${{ secrets.GITHUB_TOKEN }}
