name: Build TWRP Recovery

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    
    steps:
    - name: Checkout device tree
      uses: actions/checkout@v4
      with:
        path: device/twrp/at30a6

    - name: Setup environment and install dependencies
      run: |
        # Обновление репозиториев
        sudo apt-get update
        
        # Установка основных зависимостей для сборки Android
        sudo apt-get install -y \
          git-core gnupg flex bison build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev \
          x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev \
          libxml2-utils xsltproc unzip fontconfig python3 python-is-python3 \
          openjdk-11-jdk bc lz4 libssl-dev rsync schedtool squashfs-tools \
          imagemagick ccache git-lfs repo p7zip-full p7zip-rar cpio \
          gperf libncurses5-dev libncursesw5-dev libreadline-dev libffi-dev \
          libxml2-dev libelf-dev libiberty-dev lzma-dev lzma \
          liblz4-tool liblzma-dev zlib1g-dev libbz2-dev libfl-dev \
          libssl-dev libcap-dev libpam0g-dev libnuma-dev
        
        # Установка mkbootimg и unpackbootimg из репозитория osm0sis
        mkdir -p /tmp/android-tools
        cd /tmp/android-tools
        git clone https://github.com/osm0sis/mkbootimg.git
        cd mkbootimg
        make
        sudo cp mkbootimg unpackbootimg /usr/local/bin/
        
        # Проверяем установку
        which mkbootimg && mkbootimg --version || echo "mkbootimg installed"
        which unpackbootimg && echo "unpackbootimg installed"
        
        # Создаем симлинк для совместимости (необязательно, но полезно)
        sudo ln -sf /usr/local/bin/unpackbootimg /usr/local/bin/unmkbootimg
        
        # Альтернативно можно установить abootimg (есть в репозиториях)
        sudo apt-get install -y abootimg
        
        # Настройка ccache
        echo "CCACHE_DIR=/tmp/ccache" >> $GITHUB_ENV
        echo "USE_CCACHE=1" >> $GITHUB_ENV
        echo "CCACHE_EXEC=$(which ccache)" >> $GITHUB_ENV
        echo "CCACHE_SIZE=20G" >> $GITHUB_ENV
        ccache -M 20G
        
        # Создание симлинков
        sudo ln -sf /usr/bin/python3 /usr/bin/python

    - name: Initialize TWRP source
      run: |
        # Настройка git
        git config --global user.email "github-actions@github.com"
        git config --global user.name "GitHub Actions"
        
        # Скачивание TWRP манифеста
        mkdir -p twrp-build
        cd twrp-build
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git \
          -b twrp-13 \
          --depth=1
        
        # Копирование device tree в правильное место перед синхронизацией
        mkdir -p device/twrp/
        cp -r ../device/twrp/at30a6 device/twrp/
        
        # Проверка наличия пребилтов
        if [ ! -f "device/twrp/at30a6/prebuilt/kernel" ]; then
          echo "❌ ERROR: Kernel not found in device/twrp/at30a6/prebuilt/kernel"
          echo "Contents of device/twrp/at30a6/prebuilt/:"
          ls -la device/twrp/at30a6/prebuilt/ || true
          exit 1
        fi
        
        # Синхронизация репозиториев
        echo "Starting repo sync..."
        repo sync -c -j$(nproc --all) \
          --force-sync \
          --no-clone-bundle \
          --no-tags \
          --optimized-fetch \
          --prune

    - name: Setup build environment
      run: |
        cd twrp-build
        
        # Инициализация среды сборки
        source build/envsetup.sh
        
        # Проверка доступных целей
        echo "Available lunch targets:"
        lunch 2>&1 | grep "twrp_" || true
        
        # Выбор устройства (должно соответствовать PRODUCT_DEVICE из twrp_at30a6.mk)
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch twrp_at30a6-eng || lunch omni_at30a6-eng
        
        # Проверка конфигурации
        echo "========================================"
        echo "Build configuration:"
        echo "TARGET_ARCH: $TARGET_ARCH"
        echo "TARGET_DEVICE: $TARGET_DEVICE"
        echo "OUT_DIR: $OUT"
        echo "========================================"

    - name: Build recovery image
      run: |
        cd twrp-build
        
        # Очистка предыдущих сборок (опционально)
        # mka clean
        
        # Запуск сборки
        echo "Starting build with $(nproc --all) threads..."
        mka recoveryimage -j$(nproc --all) 2>&1 | tee build.log
        
        # Проверка результата
        if [ -f "$OUT/recovery.img" ]; then
          echo "✅ SUCCESS: Recovery image built!"
          echo "File size: $(stat -c%s $OUT/recovery.img) bytes"
          echo "Location: $OUT/recovery.img"
          
          # Быстрая проверка образа
          echo "Image info:"
          file $OUT/recovery.img || true
          
          # Сохраняем лог сборки
          cp build.log $OUT/build.log
        else
          echo "❌ ERROR: Recovery image not found in $OUT/"
          echo "Checking output directory:"
          ls -la $OUT/ || true
          
          # Показываем последние ошибки из лога
          echo "Last 50 lines of build log:"
          tail -50 build.log || true
          
          exit 1
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-at30a6-$(date +%Y%m%d-%H%M%S)
        path: |
          twrp-build/out/target/product/at30a6/recovery.img
          twrp-build/out/target/product/at30a6/kernel
          twrp-build/out/target/product/at30a6/dt.img
          twrp-build/out/target/product/at30a6/build.log
        retention-days: 7
        if-no-files-found: error

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Logs-Failed
        path: twrp-build/build.log
        retention-days: 7
