name: Build TWRP

on:
  workflow_dispatch:
    inputs:
      device_name:
        description: 'Device codename'
        required: true
        default: 'at30a6'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
    - name: Checkout device tree
      uses: actions/checkout@v4
    
    - name: Setup environment
      run: |
        sudo apt update
        sudo apt install -y git openjdk-11-jdk ccache python3 \
          gcc-multilib g++-multilib libc6-dev lib32ncurses5-dev \
          libxml2-utils xsltproc bc bison flex curl zip unzip \
          liblz4-tool libncurses5-dev libsdl1.2-dev lzop \
          pngcrush schedtool squashfs-tools gnupg build-essential
    
    - name: Initialize TWRP 11
      run: |
        mkdir twrp
        cd twrp
        git config --global user.name "GitHub"
        git config --global user.email "actions@github.com"
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11 --depth=1
        repo sync -c -j2 --no-tags --no-clone-bundle --force-sync
        
    - name: Copy device tree
      run: |
        mkdir -p twrp/device/salute/${{ github.event.inputs.device_name }}
        
        # Копируем ВСЕ файлы из репозитория
        find . -maxdepth 1 -type f -name "*.mk" -o -name "*.xml" -o -name "Android*" | xargs -I {} cp {} twrp/device/salute/${{ github.event.inputs.device_name }}/ 2>/dev/null || true
        
        # Копируем директории
        if [ -d "device" ]; then
          cp -r device/* twrp/device/salute/${{ github.event.inputs.device_name }}/ 2>/dev/null || true
        fi
        
        if [ -d "recovery" ]; then
          cp -r recovery twrp/device/salute/${{ github.event.inputs.device_name }}/ 2>/dev/null || true
        fi
        
        if [ -d "vendor" ]; then
          cp -r vendor twrp/device/salute/${{ github.event.inputs.device_name }}/ 2>/dev/null || true
        fi
        
        cd twrp/device/salute/${{ github.event.inputs.device_name }}
        
        # Создаем recovery.fstab если нужно
        if [ ! -f "recovery.fstab" ]; then
          if [ -f "recovery/root/system/etc/twrp.flags" ]; then
            cp recovery/root/system/etc/twrp.flags recovery.fstab
            echo "Created recovery.fstab from twrp.flags"
          elif [ -f "fstab.amlogic" ]; then
            cp fstab.amlogic recovery.fstab
            echo "Created recovery.fstab from fstab.amlogic"
          else
            # Минимальный fstab
            echo "/dev/block/by-name/system /system ext4 ro" > recovery.fstab
            echo "/dev/block/by-name/userdata /data ext4 rw" >> recovery.fstab
            echo "Created minimal recovery.fstab"
          fi
        fi
        
        # Проверяем необходимые файлы
        echo "Files in device directory:"
        ls -la
        
    - name: Create missing Makefiles
      run: |
        cd twrp/device/salute/${{ github.event.inputs.device_name }}
        
        # Если нет AndroidProducts.mk
        if [ ! -f "AndroidProducts.mk" ]; then
          echo "PRODUCT_MAKEFILES := \$(LOCAL_DIR)/twrp_${{ github.event.inputs.device_name }}.mk" > AndroidProducts.mk
          echo "Created AndroidProducts.mk"
        fi
        
        # Если нет twrp_<device>.mk
        if [ ! -f "twrp_${{ github.event.inputs.device_name }}.mk" ]; then
          cat > twrp_${{ github.event.inputs.device_name }}.mk << 'MKEOF'
$(call inherit-product, $(SRC_TARGET_DIR)/product/base.mk)

PRODUCT_DEVICE := ${{ github.event.inputs.device_name }}
PRODUCT_NAME := twrp_${{ github.event.inputs.device_name }}
PRODUCT_BRAND := SaluteTV
PRODUCT_MODEL := AT30A6
PRODUCT_MANUFACTURER := SaluteTV
MKEOF
          echo "Created twrp_${{ github.event.inputs.device_name }}.mk"
        fi
        
    - name: Build TWRP
      run: |
        cd twrp
        
        # Экспортируем переменные
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        
        # Инициализация
        source build/envsetup.sh
        
        # Пробуем разные варианты lunch
        lunch omni_${{ github.event.inputs.device_name }}-eng 2>/dev/null || \
        lunch twrp_${{ github.event.inputs.device_name }}-eng 2>/dev/null || \
        lunch lineage_${{ github.event.inputs.device_name }}-eng
        
        # Сборка
        make clean
        make recoveryimage -j$(nproc --all)
        
    - name: Upload recovery image
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: twrp-recovery-${{ github.event.inputs.device_name }}
        path: twrp/out/target/product/${{ github.event.inputs.device_name }}/recovery.img
        
    - name: Create release
      uses: softprops/action-gh-release@v1
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: twrp-${{ github.event.inputs.device_name }}-${{ github.run_number }}
        name: "TWRP ${{ github.event.inputs.device_name }}"
        files: twrp/out/target/product/${{ github.event.inputs.device_name }}/recovery.img
