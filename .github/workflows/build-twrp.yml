name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      device_codename:
        description: 'Device codename'
        required: true
        default: 'at30a6'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
    - name: Clean disk space
      run: |
        df -h
        sudo apt clean
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /var/lib/apt/lists/*
        sudo rm -rf /usr/local/lib/android /usr/local/lib/node_modules
        df -h

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git openjdk-17-jdk python3 ccache
        sudo apt install -y gcc-multilib g++-multilib libc6-dev
        sudo apt install -y libxml2-utils xsltproc bc bison flex curl

    - name: Download minimal TWRP source
      run: |
        mkdir twrp
        cd twrp
        
        echo "Downloading minimal sources..."
        
        # Build system
        git clone https://github.com/LineageOS/android_build.git build/make -b lineage-20.0 --depth=1
        
        # Recovery
        git clone https://github.com/TeamWin/android_bootable_recovery.git bootable/recovery -b twrp-12.1 --depth=1
        
        # System core
        git clone https://github.com/LineageOS/android_system_core.git system/core -b lineage-20.0 --depth=1
        
        # Device tree directory
        mkdir -p device/salute/${{ github.event.inputs.device_codename }}

    - name: Copy device tree
      run: |
        cd twrp/device/salute/${{ github.event.inputs.device_codename }}
        cp -r $GITHUB_WORKSPACE/*.mk $GITHUB_WORKSPACE/recovery.fstab . 2>/dev/null || true
        if [ -d "$GITHUB_WORKSPACE/recovery" ]; then
          cp -r $GITHUB_WORKSPACE/recovery . 2>/dev/null || true
        fi

    - name: Create envsetup.sh
      run: |
        cd twrp
        
        # Создаем envsetup.sh через echo
        mkdir -p build
        echo '#!/bin/bash' > build/envsetup.sh
        echo 'function lunch() {' >> build/envsetup.sh
        echo '    echo "Lunch: twrp_$1-eng"' >> build/envsetup.sh
        echo '    export TARGET_PRODUCT=twrp_$1' >> build/envsetup.sh
        echo '    export TARGET_BUILD_VARIANT=eng' >> build/envsetup.sh
        echo '    export TARGET_BUILD_TYPE=release' >> build/envsetup.sh
        echo '    export ALLOW_MISSING_DEPENDENCIES=true' >> build/envsetup.sh
        echo '    export LC_ALL=C' >> build/envsetup.sh
        echo '}' >> build/envsetup.sh
        
        chmod +x build/envsetup.sh

    - name: Build recovery directly
      run: |
        cd twrp/bootable/recovery
        
        # Прямая сборка recovery
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        export TARGET_PRODUCT=twrp_${{ github.event.inputs.device_codename }}
        export TARGET_DEVICE=${{ github.event.inputs.device_codename }}
        export TARGET_BUILD_VARIANT=eng
        export OUT_DIR_COMMON_BASE=$(pwd)/../../out
        
        echo "=== Building recovery ==="
        
        # Пробуем собрать
        mmma -j2 2>&1 | tail -100 || \
        make -j2 recoveryimage 2>&1 | tail -100

    - name: Check for recovery.img
      run: |
        echo "=== Searching for recovery.img ==="
        find twrp -name "recovery.img" -type f 2>/dev/null | head -5
        if [ -f "twrp/out/target/product/${{ github.event.inputs.device_codename }}/recovery.img" ]; then
          echo "SUCCESS: recovery.img found!"
          ls -lh twrp/out/target/product/${{ github.event.inputs.device_codename }}/recovery.img
        else
          echo "No recovery.img found"
        fi

    - name: Upload recovery image
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: recovery-${{ github.event.inputs.device_codename }}
        path: twrp/out/target/product/${{ github.event.inputs.device_codename }}/recovery.img
