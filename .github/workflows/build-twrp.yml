name: Recovery Build

on:
  workflow_dispatch:
    inputs:
      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
        default: 'at30a6'
      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME'
        required: true
        default: 'twrp_at30a6'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    permissions:
      contents: write
      
    steps:
    - name: Check Out Device Tree
      uses: actions/checkout@v4

    - name: Cleanup Workspace
      uses: rokibhasansagar/slimhub_actions@main

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y gperf gcc-multilib g++-multilib libc6-dev \
          lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev \
          libgl1-mesa-dev libxml2-utils xsltproc bc ccache lib32readline-dev \
          lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev \
          libwxgtk3.0-gtk3-dev lzop pngcrush schedtool squashfs-tools python3 \
          git-core gnupg flex bison build-essential zip curl zlib1g-dev rsync

    - name: Install OpenJDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install repo tool
      run: |
        mkdir -p ~/bin
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo cp ~/bin/repo /usr/bin/repo

    - name: Initialize TWRP Source (twrp-11)
      run: |
        mkdir -p twrp_build
        cd twrp_build
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        # Используем twrp-11 - более стабильную версию
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp -b twrp-11

    - name: Sync Source Code
      run: |
        cd twrp_build
        repo sync -c -j2 --no-tags --no-clone-bundle --force-sync

    - name: Fix libbinder issue
      run: |
        cd twrp_build
        echo "=== Исправляем libbinder ==="
        # Просто удаляем problem строку
        sed -i '/version_script: "libbinder.map.txt",/d' frameworks/native/libs/binder/Android.bp 2>/dev/null || true

    - name: Copy Device Tree
      run: |
        echo "=== Копирование дерева устройства ==="
        mkdir -p twrp_build/device/salute/at30a6
        
        # Копируем всё
        cp -r * twrp_build/device/salute/at30a6/ 2>/dev/null || true
        cp -r .* twrp_build/device/salute/at30a6/ 2>/dev/null || true
        
        cd twrp_build/device/salute/at30a6
        echo "=== Содержимое директории устройства ==="
        ls -la
        
        # Если нет recovery.fstab, создаем из twrp.flags
        if [ ! -f "recovery.fstab" ] && [ -f "recovery/root/system/etc/twrp.flags" ]; then
          cp recovery/root/system/etc/twrp.flags recovery.fstab
        fi

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Build Recovery
      run: |
        cd twrp_build
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        
        echo "=== Начало сборки ==="
        source build/envsetup.sh
        lunch twrp_at30a6-eng
        make clean
        echo "=== Компиляция recoveryimage ==="
        make recoveryimage -j2

    - name: Upload Recovery Image
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: recovery-at30a6
        path: twrp_build/out/target/product/at30a6/recovery.img

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        files: twrp_build/out/target/product/at30a6/recovery.img
        name: "TWRP at30a6"
        tag_name: "build-${{ github.run_number }}"
        body: |
          TWRP Recovery for SaluteTV at30a6
          Built: $(date)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
