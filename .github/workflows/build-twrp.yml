name: TWRP Build for at30a6
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes:name: TWRP Build
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
    - uses: actions/checkout@v4
    - name: Setup
      run: |
        sudo apt-get update
        sudo apt-get install -y git python3 openjdk-11-jdk curl bc
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
        chmod +x ~/repo && sudo mv ~/repo /usr/local/bin/
    - name: Build
      run: |
        mkdir twrp && cd twrp
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11 --depth=1
        mkdir -p .repo/local_manifests
        cat > .repo/local_manifests/local.xml << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <remove-project name="platform/prebuilts/clang/host/linux-x86" />
          <remove-project name="platform/prebuilts/gcc/linux-x86" />
        </manifest>
        EOF
        repo sync -c -j2 --no-tags --no-clone-bundle
        mkdir -p device/salute/at30a6
        cp ../*.mk ../prebuilt/kernel device/salute/at30a6/
        export ALLOW_MISSING_DEPENDENCIES=true
        export USE_LD=gold
        source build/envsetup.sh
        lunch twrp_at30a6-eng || export TARGET_PRODUCT=twrp_at30a6
        make -j2 recoveryimage || make -j2 recovery
        find out -name "recovery.img" -exec cp {} ../recovery.img \;
        [ -f ../recovery.img ] && echo "✅" || echo "❌"
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: TWRP
        path: recovery.img 120

    steps:
    - uses: actions/checkout@v4

    - name: Setup environment
      run: |
        sudo apt-get update
        sudo apt-get install -y git python3 openjdk-11-jdk curl bc bison flex gperf zip unzip
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
        chmod +x ~/repo
        sudo mv ~/repo /usr/local/bin/
        /usr/local/bin/repo version

    - name: Build TWRP
      run: |
        echo "=== TWRP BUILD ==="
        mkdir -p twrp && cd twrp
        
        # 1. Initialize
        /usr/local/bin/repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11 --depth=1
        
        # 2. Create local manifest to exclude space-heavy projects
        mkdir -p .repo/local_manifests
        cat > .repo/local_manifests/local.xml << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <remove-project name="platform/prebuilts/clang/host/linux-x86" />
          <remove-project name="platform/prebuilts/gcc/linux-x86" />
          <remove-project name="platform/prebuilts/ndk" />
          <remove-project name="platform/prebuilts/sdk" />
        </manifest>
        EOF
        
        # 3. Sync with space optimization
        echo "Syncing (this takes 10-20 minutes)..."
        /usr/local/bin/repo sync -c -j2 \
          --no-tags \
          --no-clone-bundle \
          --optimized-fetch \
          --fail-fast=false \
          --force-sync
        
        # 4. Check disk space
        echo "Disk space after sync:"
        df -h
        
        # 5. Copy device tree
        mkdir -p device/salute/at30a6
        for file in ../*.mk; do [ -f "$file" ] && cp "$file" device/salute/at30a6/; done
        [ -d "../prebuilt" ] && cp -r ../prebuilt device/salute/at30a6/
        [ -d "../recovery" ] && cp -r ../recovery device/salute/at30a6/
        
        echo "Device tree copied:"
        ls -la device/salute/at30a6/
        
        # 6. Setup build environment
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        export USE_LD=gold
        export BUILD_BROKEN_DUP_RULES=true
        
        source build/envsetup.sh
        
        # 7. Select device
        if lunch twrp_at30a6-eng 2>/dev/null; then
          echo "Selected: twrp_at30a6-eng"
        else
          export TARGET_DEVICE=at30a6
          export TARGET_PRODUCT=twrp_at30a6
          export TARGET_BUILD_VARIANT=eng
          echo "Manual: TARGET_PRODUCT=$TARGET_PRODUCT"
        fi
        
        # 8. Build
        echo "Building recovery..."
        make -j2 recoveryimage 2>&1 | tee build.log || {
          echo "Trying alternative build..."
          make -j2 recovery 2>&1 | tee -a build.log
        }
        
        # 9. Find result
        find out -name "recovery.img" -type f 2>/dev/null | head -1 | while read img; do
          echo "Found: $img"
          cp "$img" ../recovery.img
        done
        
        # 10. Check result
        if [ -f "../recovery.img" ]; then
          echo "✅ SUCCESS: TWRP recovery built!"
          ls -lh ../recovery.img
          echo "Size: $(wc -c < ../recovery.img) bytes"
        else
          echo "❌ FAILED: No recovery.img found"
          echo "Last 30 lines of build log:"
          tail -30 build.log 2>/dev/null || echo "No build log"
          echo "Searching for any images:"
          find out -name "*.img" -type f 2>/dev/null | head -5
          exit 1
        fi

    - name: Upload TWRP recovery
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Recovery-at30a6
        path: recovery.img
        if-no-files-found: error
        retention-days: 30

    - name: Create Release
      if: success() && github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        files: recovery.img
        tag_name: twrp-$(date +%Y%m%d)
        name: "TWRP $(date +%Y-%m-%d)"
        body: |
          # TWRP Recovery for SaluteTV at30a6
          
          Built: $(date)
          
          ### Installation:
          ```
          fastboot flash recovery recovery.img
          fastboot reboot recovery
          ```
        draft: false
