name: Recovery Build for SaluteTV AT30A6

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'TWRP manifest URL'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'
      MANIFEST_BRANCH:
        description: 'TWRP manifest branch'
        required: true
        default: 'twrp-11'
      DEVICE_TREE_URL:
        description: 'Device tree repository URL'
        required: true
        default: 'https://github.com/SKOCHE/SaluteTV_at30a6_TWRP'
      DEVICE_TREE_BRANCH:
        description: 'Device tree branch'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'Device path in device tree'
        required: true
        default: 'device/salute/at30a6'
      DEVICE_NAME:
        description: 'Device name'
        required: true
        default: 'at30a6'
      MAKEFILE_NAME:
        description: 'Makefile name'
        required: true
        default: 'twrp_at30a6'
      BUILD_TARGET:
        description: 'Build target'
        required: true
        default: 'recovery'

jobs:
  build:
    runs-on: ubuntu-22.04  # Изменено на 22.04
    permissions:
      contents: write

    steps:
    - name: Check Out
      uses: actions/checkout@v3

    - name: Cleanup Workspace
      uses: rokibhasansagar/slimhub_actions@main

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt -y install git gperf build-essential gcc-multilib g++-multilib \
          lib32z-dev lib32ncurses5-dev libxml2-utils xsltproc bc ccache \
          liblz4-tool libncurses5-dev lzop imagemagick libbz2-dev python3 \
          curl libssl-dev libreadline-dev zlib1g-dev
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
      
    - name: Install OpenJDK 8
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '8'

    - name: Install repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize repo with optimizations
      run: |
        mkdir workspace
        cd workspace
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        # Оптимизация для экономии места
        repo init --depth=1 -u ${{ github.event.inputs.MANIFEST_URL }} \
          -b ${{ github.event.inputs.MANIFEST_BRANCH }} \
          --groups=default,-darwin,-mips,-x86,-notdefault

    - name: Repo Sync with space saving
      run: |
        repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
        # Очистка git-объектов для экономии места
        find . -name ".git" -type d -prune -exec rm -rf {} \; 2>/dev/null || true
        rm -rf .repo/projects/*.git
        rm -rf .repo/project-objects
      working-directory: workspace

    - name: Clone device tree
      run: |
        git clone ${{ github.event.inputs.DEVICE_TREE_URL }} \
          -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} \
          workspace/${{ github.event.inputs.DEVICE_PATH }}

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 16  # Увеличенный swap

    - name: Clean workspace before build
      run: |
        cd workspace
        # Удаляем .repo после синхронизации
        rm -rf .repo
        # Очистка системных кэшей
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/lib/android
        sudo apt-get clean
        # Показываем свободное место
        df -h
        du -sh .

    - name: Building recovery with optimizations
      run: |
        cd workspace
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        # Оптимизации для экономии места
        export USE_CCACHE=1
        export CCACHE_COMPRESS=1
        export CCACHE_DIR=/tmp/ccache
        ccache -M 2G  # Ограничение кэша
        
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng
        make clean
        # Сборка только recoveryimage
        make ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)

    - name: Check and compress output
      run: |
        cd workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}
        if [ -f "${{ github.event.inputs.BUILD_TARGET }}.img" ]; then
          echo "Build successful! File size:"
          ls -lh "${{ github.event.inputs.BUILD_TARGET }}.img"
          # Сжимаем для экономии места при загрузке
          gzip -k "${{ github.event.inputs.BUILD_TARGET }}.img"
        else
          echo "Build failed - output file not found"
          exit 1
        fi

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_TARGET }}.img
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_TARGET }}.img.gz
        name: ${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          TWRP Recovery for SaluteTV AT30A6
          Manifest: ${{ github.event.inputs.MANIFEST_BRANCH }}
          Device: ${{ github.event.inputs.DEVICE_NAME }}
          Target: ${{ github.event.inputs.BUILD_TARGET }}.img
          Build Date: ${{ github.event.created_at }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
