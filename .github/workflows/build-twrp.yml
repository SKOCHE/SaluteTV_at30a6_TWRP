name: TWRP Build for at30a6

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    
    steps:
    - name: Checkout device tree
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
          git python3 openjdk-11-jdk curl \
          build-essential bc bison flex gperf zip unzip
    
    - name: Install repo tool
      run: |
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
        chmod +x ~/repo
        sudo mv ~/repo /usr/local/bin/
        repo version
    
    - name: Initialize and build
      env:
        ALLOW_MISSING_DEPENDENCIES: true
        LC_ALL: C
        USE_LD: gold
      run: |
        mkdir twrp && cd twrp
        
        # Minimal init
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git \
          -b twrp-11 --depth=1
        
        # Sync only required
        repo sync -c -j2 --no-tags --no-clone-bundle \
          platform/build \
          platform/bionic \
          platform/system/core \
          bootable/recovery
        
        # Copy device tree
        mkdir -p device/salute/at30a6
        cp -r ../* device/salute/at30a6/ 2>/dev/null || true
        
        # Build
        source build/envsetup.sh
        export TARGET_DEVICE=at30a6
        export TARGET_PRODUCT=omni_at30a6
        make -j2 recoveryimage 2>&1 | tee build.log
        
        # Copy result
        find out -name "recovery.img" -exec cp {} ../recovery.img \;
    
    - name: Upload result
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Recovery
        path: recovery.img
        if-no-files-found: error
