name: TWRP Build for at30a6
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git-core gnupg flex bison build-essential zip curl \
          zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 \
          lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev \
          libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig \
          python3 openjdk-11-jdk bc coreutils cpio gzip \
          android-sdk-libsparse-utils libssl-dev
        
        # Устанавливаем repo
        mkdir -p ~/bin
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+rx ~/bin/repo
        echo 'export PATH="$HOME/bin:$PATH"' >> ~/.bashrc
        source ~/.bashrc
    
    - name: Build TWRP
      run: |
        echo "=== Начало сборки TWRP для at30a6 ==="
        
        # 1. Подготовка директории
        mkdir -p twrp/device/salute/at30a6
        cd twrp
        
        # 2. Копирование device tree
        echo "Копируем device tree..."
        cp -r ../prebuilt device/salute/at30a6/ 2>/dev/null || true
        cp ../*.mk device/salute/at30a6/ 2>/dev/null || true
        cp ../recovery.fstab device/salute/at30a6/ 2>/dev/null || true
        cp ../mkbootimg.mk device/salute/at30a6/ 2>/dev/null || true
        
        # 3. Проверяем файлы
        echo "Проверяем файлы:"
        ls -la device/salute/at30a6/
        
        # 4. Инициализация репозитория
        echo "Инициализация репозитория TWRP..."
        repo init \
          -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git \
          -b twrp-11 \
          --depth=1
        
        # 5. Создаем local manifest для нашего устройства
        mkdir -p .repo/local_manifests
        cat > .repo/local_manifests/local.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<manifest>
  <project path="device/salute/at30a6" 
           name="SKOCHE/SaluteTV_at30a6_TWRP" 
           remote="github" 
           revision="main" />
</manifest>
EOF
        
        # Добавляем remote
        git config --global url."https://github.com/".insteadOf git://github.com/
        
        # 6. Синхронизация только необходимого
        echo "Синхронизация репозиториев..."
        repo sync -c -j2 --no-tags --no-clone-bundle \
          device/salute/at30a6 \
          bootable/recovery \
          system/core \
          system/extras \
          external/libpng \
          external/zlib \
          external/freetype \
          2>&1 | tail -100
        
        # 7. Проверяем, что device tree скопировался
        if [ ! -f "device/salute/at30a6/BoardConfig.mk" ]; then
          echo "Копируем device tree вручную..."
          cp -r ../device/salute/at30a6/* device/salute/at30a6/ 2>/dev/null || true
        fi
        
        # 8. Настройка сборки
        echo "Настройка сборки..."
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        export USE_CCACHE=1
        ccache -M 10G
        
        source build/envsetup.sh
        
        # 9. Пытаемся запустить lunch
        echo "Запуск lunch..."
        if lunch twrp_at30a6-eng 2>/dev/null; then
          echo "lunch успешен"
        else
          # Если lunch не работает, устанавливаем переменные вручную
          echo "Ручная настройка..."
          export TARGET_PRODUCT=twrp_at30a6
          export TARGET_BUILD_VARIANT=eng
          export TARGET_BUILD_TYPE=release
        fi
        
        # 10. Сборка recovery
        echo "=== СБОРКА RECOVERY ==="
        make -j2 recoveryimage 2>&1 | tee build.log
        
        # 11. Проверка результата
        echo "=== ПРОВЕРКА РЕЗУЛЬТАТА ==="
        
        # Ищем recovery.img
        RECOVERY_IMG=""
        for path in \
          "out/target/product/at30a6/recovery.img" \
          "out/target/product/*/recovery.img" \
          "$(find . -name "recovery.img" -type f 2>/dev/null | grep -v testdata | head -1)"; do
          
          if [ -f "$path" ]; then
            RECOVERY_IMG="$path"
            echo "✅ Найден recovery.img: $path"
            break
          fi
        done
        
        if [ -n "$RECOVERY_IMG" ]; then
          # Копируем на уровень выше
          cp "$RECOVERY_IMG" ../recovery.img
          SIZE=$(stat -c%s ../recovery.img 2>/dev/null || echo 0)
          echo "Размер recovery.img: $SIZE байт"
          
          # Если размер меньше 30MB, заполняем до 32MB
          if [ $SIZE -lt 30000000 ]; then
            echo "Заполняем до 32MB..."
            truncate -s 33554432 ../recovery.img
            echo "Новый размер: $(stat -c%s ../recovery.img) байт"
          fi
          
          # Проверяем конечный размер
          FINAL_SIZE=$(stat -c%s ../recovery.img 2>/dev/null || echo 0)
          echo "=== ИТОГ ==="
          echo "Файл: ../recovery.img"
          echo "Размер: $FINAL_SIZE байт"
          echo "Ожидалось: 33554432 байт (32MB)"
          
          if [ $FINAL_SIZE -eq 33554432 ]; then
            echo "🎉 УСПЕХ! Правильный размер!"
          else
            echo "⚠️ Размер отличается, но файл создан"
          fi
        else
          echo "❌ recovery.img не найден после сборки"
          echo "Содержимое out/target/product/at30a6/:"
          ls -la out/target/product/at30a6/ 2>/dev/null || echo "Директория не существует"
          exit 1
        fi
        
        cd ..
    
    - name: Upload TWRP Recovery
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-at30a6
        path: recovery.img
        retention-days: 30
    
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Log
        path: twrp/build.log
        retention-days: 7
