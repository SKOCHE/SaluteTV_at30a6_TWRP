name: Build TWRP Recovery
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y cpio gzip python3 bc
    
    - name: Create TWRP files
      run: |
        echo "Creating TWRP files..."
        rm -rf recovery/root
        mkdir -p recovery/root
        
        # init.rc
        echo "on early-init" > recovery/root/init.rc
        echo "    start ueventd" >> recovery/root/init.rc
        echo "" >> recovery/root/init.rc
        echo "on init" >> recovery/root/init.rc
        echo "    mkdir /dev" >> recovery/root/init.rc
        echo "    mkdir /proc" >> recovery/root/init.rc
        echo "    mkdir /sys" >> recovery/root/init.rc
        echo "    mkdir /tmp" >> recovery/root/init.rc
        echo "    mount tmpfs tmpfs /tmp" >> recovery/root/init.rc
        echo "    chmod 0777 /tmp" >> recovery/root/init.rc
        echo "" >> recovery/root/init.rc
        echo "service ueventd /sbin/ueventd" >> recovery/root/init.rc
        echo "    class core" >> recovery/root/init.rc
        echo "    critical" >> recovery/root/init.rc
        echo "" >> recovery/root/init.rc
        echo "service recovery /sbin/recovery" >> recovery/root/init.rc
        echo "    class main" >> recovery/root/init.rc
        echo "    disabled" >> recovery/root/init.rc
        echo "    oneshot" >> recovery/root/init.rc
        
        # default.prop
        echo "ro.secure=0" > recovery/root/default.prop
        echo "ro.debuggable=1" >> recovery/root/default.prop
        echo "ro.adb.secure=0" >> recovery/root/default.prop
        echo "ro.build.product=at30a6" >> recovery/root/default.prop
        echo "ro.product.device=at30a6" >> recovery/root/default.prop
        
        # Создаем структуру
        mkdir -p recovery/root/sbin
        mkdir -p recovery/root/etc
        
        # recovery binary
        echo "#!/bin/sh" > recovery/root/sbin/recovery
        echo 'echo "TWRP Recovery"' >> recovery/root/sbin/recovery
        chmod 755 recovery/root/sbin/recovery
        
        # ueventd binary
        echo "#!/bin/sh" > recovery/root/sbin/ueventd
        echo 'echo "ueventd"' >> recovery/root/sbin/ueventd
        chmod 755 recovery/root/sbin/ueventd
        
        echo "Files created"
    
    - name: Build ramdisk
      run: |
        echo "Building ramdisk..."
        cd recovery/root
        find . | cpio -o -H newc 2>/dev/null | gzip -9 > ../../ramdisk.cpio.gz
        cd ../../
        echo "Ramdisk created"
    
    - name: Build recovery image
      run: |
        echo "Building recovery.img..."
        
        # Простой способ создать boot.img
        # 1. Создаем заголовок (Android boot image header)
        echo -n "ANDROID!" > header.bin
        printf "\\x00\\x00\\x00\\x00" >> header.bin  # kernel size (заполним позже)
        printf "\\x00\\x00\\x00\\x00" >> header.bin  # kernel addr
        printf "\\x00\\x00\\x00\\x00" >> header.bin  # ramdisk size
        printf "\\x00\\x00\\x08\\x01" >> header.bin  # ramdisk addr (0x01000000)
        printf "\\x00\\x00\\x00\\x00" >> header.bin  # second size
        printf "\\x00\\x00\\xf0\\x00" >> header.bin  # second addr (0x00f00000)
        printf "\\x00\\x00\\x00\\x01" >> header.bin  # tags addr (0x00000100)
        printf "\\x00\\x00\\x00\\x00" >> header.bin  # page size (заполним)
        printf "\\x00\\x00\\x00\\x00" >> header.bin  # unused
        printf "\\x00\\x00\\x00\\x00" >> header.bin  # os version
        printf "\\x00\\x00\\x00\\x00" >> header.bin  # name
        printf "\\x00\\x00\\x00\\x00" >> header.bin  # cmdline
        printf "\\x00\\x00\\x00\\x00" >> header.bin  # id
        
        # 2. Собираем компоненты
        KERNEL_SIZE=$(stat -c%s prebuilt/kernel 2>/dev/null || echo 0)
        RAMDISK_SIZE=$(stat -c%s ramdisk.cpio.gz 2>/dev/null || echo 0)
        DTB_SIZE=$(stat -c%s prebuilt/dt.img 2>/dev/null || echo 0)
        
        echo "Kernel: $KERNEL_SIZE bytes"
        echo "Ramdisk: $RAMDISK_SIZE bytes"
        echo "DTB: $DTB_SIZE bytes"
        
        # 3. Создаем recovery.img
        cat header.bin > recovery.img
        cat prebuilt/kernel >> recovery.img
        cat ramdisk.cpio.gz >> recovery.img
        cat prebuilt/dt.img >> recovery.img
        
        # 4. Заполняем до 32MB
        truncate -s 33554432 recovery.img
        
        echo "Final size: $(stat -c%s recovery.img) bytes"
        
        # Очистка
        rm -f header.bin ramdisk.cpio.gz 2>/dev/null || true
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TWRP
        path: recovery.img
