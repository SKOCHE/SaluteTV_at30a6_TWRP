name: Build TWRP Recovery FINAL
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y cpio gzip wget python3 git bc
    
    - name: Get proper mkbootimg
      run: |
        git clone https://github.com/osm0sis/mkbootimg.git /tmp/mkbootimg_src
        cd /tmp/mkbootimg_src
        gcc -o mkbootimg mkbootimg.c
        sudo cp mkbootimg /usr/local/bin/
    
    - name: Create TWRP ramdisk
      run: |
        echo "=== Creating TWRP ramdisk ==="
        rm -rf recovery/root
        mkdir -p recovery/root
        
        # 1. Создаем файлы ПОЭТАПНО
        # init.rc
        cat > recovery/root/init.rc << 'INIT_EOF'
on early-init
    start ueventd

on init
    mkdir /dev
    mkdir /proc
    mkdir /sys
    mkdir /tmp
    mount tmpfs tmpfs /tmp
    chmod 0777 /tmp
    mkdir /sdcard
    mkdir /system
    mkdir /data

service ueventd /sbin/ueventd
    class core
    critical

service recovery /sbin/recovery
    class main
    disabled
    oneshot
INIT_EOF
        
        # default.prop
        cat > recovery/root/default.prop << 'PROP_EOF'
ro.secure=0
ro.debuggable=1
ro.adb.secure=0
ro.build.product=at30a6
ro.product.device=at30a6
ro.twrp.boot=1
ro.twrp.version=3.7.0
PROP_EOF
        
        # 2. Создаем структуру
        mkdir -p recovery/root/{sbin,etc,res}
        
        # 3. Создаем исполняемые файлы
        # recovery
        cat > recovery/root/sbin/recovery << 'RECOVERY_EOF'
#!/sbin/sh
echo "TWRP Recovery for at30a6"
sleep 2
RECOVERY_EOF
        chmod 755 recovery/root/sbin/recovery
        
        # ueventd  
        cat > recovery/root/sbin/ueventd << 'UEVENTD_EOF'
#!/sbin/sh
echo "ueventd started"
UEVENTD_EOF
        chmod 755 recovery/root/sbin/ueventd
        
        # sh
        cat > recovery/root/sbin/sh << 'SH_EOF'
#!/sbin/sh
echo "TWRP Shell"
SH_EOF
        chmod 755 recovery/root/sbin/sh
        
        # 4. recovery.fstab
        cat > recovery/root/etc/recovery.fstab << 'FSTAB_EOF'
/dev/block/boot /boot emmc defaults
/dev/block/system /system ext4 ro
/dev/block/data /data f2fs rw
FSTAB_EOF
        
        echo "Created $(find recovery/root -type f | wc -l) files"
    
    - name: Build ramdisk
      run: |
        echo "=== Building ramdisk.cpio.gz ==="
        cd recovery/root
        
        echo "Files to package:"
        find . -type f
        
        # Создаем архив
        find . | cpio -o -H newc 2>/dev/null | gzip -9 > ../../ramdisk.cpio.gz
        cd ../../
        
        SIZE=$(stat -c%s ramdisk.cpio.gz 2>/dev/null || echo 0)
        echo "Ramdisk size: $SIZE bytes"
        
        if [ $SIZE -lt 100 ]; then
          echo "ERROR: Ramdisk too small!"
          exit 1
        fi
    
    - name: Build recovery image
      run: |
        echo "=== Building recovery.img ==="
        
        # Проверяем компоненты
        if [ ! -f "prebuilt/kernel" ]; then
          echo "ERROR: prebuilt/kernel not found!"
          exit 1
        fi
        if [ ! -f "prebuilt/dt.img" ]; then
          echo "ERROR: prebuilt/dt.img not found!"
          exit 1
        fi
        if [ ! -f "ramdisk.cpio.gz" ]; then
          echo "ERROR: ramdisk.cpio.gz not found!"
          exit 1
        fi
        
        echo "Kernel: $(stat -c%s prebuilt/kernel) bytes"
        echo "DTB: $(stat -c%s prebuilt/dt.img) bytes"
        echo "Ramdisk: $(stat -c%s ramdisk.cpio.gz) bytes"
        
        # Собираем образ
        mkbootimg \
          --kernel prebuilt/kernel \
          --ramdisk ramdisk.cpio.gz \
          --dt prebuilt/dt.img \
          --cmdline "androidboot.selinux=permissive" \
          --base 0x00000000 \
          --pagesize 2048 \
          --kernel_offset 0x00008000 \
          --ramdisk_offset 0x01000000 \
          --tags_offset 0x00000100 \
          --header_version 2 \
          --output recovery.img
        
        if [ ! -f "recovery.img" ]; then
          echo "ERROR: mkbootimg failed!"
          exit 1
        fi
        
        # Заполняем до 32MB
        truncate -s 33554432 recovery.img
        
        echo "Final size: $(stat -c%s recovery.img) bytes"
        
        # Быстрая проверка
        echo "First 16 bytes:"
        hexdump -C recovery.img | head -2
    
    - name: Verify and upload
      run: |
        echo "=== Verification ==="
        SIZE=$(stat -c%s recovery.img 2>/dev/null || echo 0)
        
        if [ $SIZE -eq 33554432 ]; then
          echo "✅ SUCCESS: 32MB recovery.img created!"
          echo "File ready for Android Image Kitchen"
        else
          echo "❌ ERROR: Wrong size - $SIZE bytes"
          exit 1
        fi
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-at30a6-FINAL
        path: recovery.img
