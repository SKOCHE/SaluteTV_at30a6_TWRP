name: Build TWRP Recovery
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y cpio gzip wget
    
    - name: Download mkbootimg
      run: |
        wget -q https://raw.githubusercontent.com/osm0sis/Android-image-editor/master/mkbootimg/mkbootimg -O /tmp/mkbootimg
        chmod +x /tmp/mkbootimg
        sudo mv /tmp/mkbootimg /usr/local/bin/
    
    - name: Build recovery image
      run: |
        echo "Building recovery.img..."
        
        # Create ramdisk if doesn't exist
        if [ ! -d "recovery/root" ]; then
          mkdir -p recovery/root
          echo "ro.build.product=at30a6" > recovery/root/default.prop
        fi
        
        # Create ramdisk
        cd recovery/root
        find . | cpio -o -H newc | gzip > ../../ramdisk.cpio.gz
        cd ../../
        
        # Build image
        mkbootimg \
          --kernel prebuilt/kernel \
          --ramdisk ramdisk.cpio.gz \
          --dt prebuilt/dt.img \
          --cmdline "androidboot.selinux=permissive" \
          --base 0x00000000 \
          --pagesize 2048 \
          --kernel_offset 0x00008000 \
          --ramdisk_offset 0x01000000 \
          --tags_offset 0x00000100 \
          --header_version 2 \
          --output recovery.img
        
        # Resize to 32MB
        truncate -s 33554432 recovery.img
        
        echo "Done! Size: $(stat -c%s recovery.img) bytes"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TWRP
        path: recovery.img
