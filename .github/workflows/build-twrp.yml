name: Recovery Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'MANIFEST_URL (if want to use SSH keys, use git@github.com:XXXXX)'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'
      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH'
        required: true
        default: 'twrp-12.1' 
      DEVICE_TREE_URL:
        description: 'DEVICE_TREE_URL'
        required: true
        default: 'https://github.com/SKOCHE/SaluteTV_at30a6_TWRP'
      DEVICE_TREE_BRANCH:
        description: 'DEVICE_TREE_BRANCH'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'DEVICE_PATH'
        required: true
        default: 'device/salute/at30a6'
      COMMON_TREE_URL:
        description: 'COMMON_TREE_URL (if no common tree, leave blank)'
        required: false
      COMMON_PATH:
        description: 'COMMON_PATH (if no common tree, leave blank)'
        required: false
      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
        default: 'at30a6'
      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME'
        required: true
        default: 'twrp_at30a6'
      BUILD_TARGET:
        description: 'BUILD_TARGET'
        required: true
        default: 'recovery'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: write
      
    steps:
    - name: Display Run Parameters
      run: |
        echo "::group::Build Configuration"
        echo "Manifest URL: ${{ github.event.inputs.MANIFEST_URL }}"
        echo "Manifest Branch: ${{ github.event.inputs.MANIFEST_BRANCH }}"
        echo "Device Tree URL: ${{ github.event.inputs.DEVICE_TREE_URL }}"
        echo "Device Tree Branch: ${{ github.event.inputs.DEVICE_TREE_BRANCH }}"
        echo "Device Path: ${{ github.event.inputs.DEVICE_PATH }}"
        echo "Device Name: ${{ github.event.inputs.DEVICE_NAME }}"
        echo "Makefile Name: ${{ github.event.inputs.MAKEFILE_NAME }}"
        echo "Build Target: ${{ github.event.inputs.BUILD_TARGET }}.img"
        echo "::endgroup::"

    - name: Check Out This Repository
      uses: actions/checkout@v4
      with:
        path: local_tree

    - name: Prepare Environment
      run: |
        sudo apt update -y
        sudo apt install -y \
          git-core gnupg flex bison build-essential zip \
          curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 \
          lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev \
          libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig \
          python2 python3 bc ccache liblz4-tool libncurses5 \
          libssl-dev libsdl1.2-dev libwxgtk3.0-gtk3-dev lzop \
          pngcrush schedtool squashfs-tools tree rsync
        # Очистка кэша после установки
        sudo apt clean
        sudo rm -rf /var/lib/apt/lists/*

    - name: Install OpenJDK 17 (for Android 13)
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup SSH Keys (if needed)
      if: ${{ startsWith(github.event.inputs.MANIFEST_URL, 'git@github.com') }}
      uses: webfactory/ssh-agent@v0.5.4
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Install repo tool
      run: |
        sudo apt install -y repo
        repo --version

    - name: Check Disk Space Before Start
      run: |
        echo "=== Initial Disk Space ==="
        df -h
        echo "=== Home directory size ==="
        du -sh ~/ || true

    - name: Initialize repo workspace
      run: |
        mkdir -p workspace
        cd workspace
        echo "workspace=$(pwd)" >> $GITHUB_ENV
        
        # Настройка git для избежания проблем
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git config --global color.ui false
        git config --global http.postBuffer 1048576000
        
        # Минимальная конфигурация для экономии места
        repo init --depth=1 -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }} --repo-url=https://gerrit.googlesource.com/git-repo --groups=default,-darwin,-notdefault,-mips

    - name: Update repo tool to latest version
      run: |
        # Обновляем repo до последней версии
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > /tmp/repo
        chmod a+x /tmp/repo
        sudo mv /tmp/repo /usr/bin/repo
        repo --version

    - name: Repo Sync with minimal footprint
      id: repo_sync
      continue-on-error: false
      timeout-minutes: 30
      run: |
        cd workspace
        
        # Агрессивная экономия места
        SYNC_OPTIONS="-c -j2 --depth=1 --no-tags --no-clone-bundle --force-sync --optimized-fetch --current-branch"
        
        echo "Starting repo sync with options: $SYNC_OPTIONS"
        echo "WARNING: Using minimal depth=1 to save disk space!"
        
        # Пробуем синхронизацию с таймаутами
        for i in {1..3}; do
          echo "Attempt $i/3..."
          
          # Запускаем sync с таймаутом (20 минут)
          timeout 1200 repo sync $SYNC_OPTIONS
          
          SYNC_EXIT_CODE=$?
          
          if [ $SYNC_EXIT_CODE -eq 0 ]; then
            echo "✅ Repo sync completed successfully on attempt $i"
            echo "sync_success=true" >> $GITHUB_OUTPUT
            break
          elif [ $SYNC_EXIT_CODE -eq 124 ]; then
            echo "⚠️ Repo sync timed out on attempt $i"
            if [ $i -lt 3 ]; then
              echo "Waiting 10 seconds before retry..."
              sleep 10
            fi
          else
            echo "❌ Repo sync failed with exit code: $SYNC_EXIT_CODE"
            
            if [ $i -eq 3 ]; then
              exit $SYNC_EXIT_CODE
            fi
            
            echo "Waiting 10 seconds before retry..."
            sleep 10
          fi
        done
        
        if [ ! -f .repo/manifest.xml ]; then
          echo "❌ Repo initialization failed - manifest.xml not found"
          exit 1
        fi
        
        echo "Disk usage after repo sync:"
        du -sh . 2>/dev/null || echo "Cannot check disk usage"

    - name: Clean up unnecessary files
      if: steps.repo_sync.outputs.sync_success == 'true'
      run: |
        cd workspace
        echo "Cleaning up unnecessary files to save disk space..."
        
        # Директории, которые можно удалить для TWRP сборки
        # (сохраняем только самое необходимое)
        UNNECESSARY_DIRS=(
          "art"
          "cts"
          "developers"
          "development"
          "docs"
          "external"
          "hardware"
          "libcore"
          "libnativehelper"
          "ndk"
          "pdk"
          "platform_testing"
          "prebuilts"
          "sdk"
          "toolchain"
          "tools"
          "test"
          "trusty"
          "vendor/google"
        )
        
        for dir in "${UNNECESSARY_DIRS[@]}"; do
          if [ -d "$dir" ]; then
            echo "Removing $dir/ to save space..."
            rm -rf "$dir" 2>/dev/null || true
          fi
        done
        
        # Очистка .git объектов
        echo "Cleaning .git objects..."
        find . -name ".git" -type d -exec rm -rf {} + 2>/dev/null || true
        
        echo "Disk usage after cleanup:"
        du -sh . 2>/dev/null || echo "Cannot check disk usage"

    - name: Verify repo workspace
      if: steps.repo_sync.outputs.sync_success == 'true'
      run: |
        cd workspace
        echo "=== Repo Workspace Verification ==="
        
        echo "1. Checking essential files..."
        if [ -f .repo/manifest.xml ]; then
          echo "   ✅ .repo/manifest.xml exists"
        else
          echo "   ❌ .repo/manifest.xml missing!"
          exit 1
        fi
        
        echo "2. Checking critical Android directories..."
        CRITICAL_DIRS=("build" "bootable" "device" "frameworks" "system")
        
        for dir in "${CRITICAL_DIRS[@]}"; do
          if [ -d "$dir" ]; then
            echo "   ✅ $dir/ exists"
          else
            echo "   ⚠️  $dir/ missing (might be OK for TWRP)"
          fi
        done
        
        echo "3. Total workspace size:"
        du -sh . 2>/dev/null || true

    - name: Copy Local Device Tree
      run: |
        # Используем локальные файлы вместо клонирования
        mkdir -p workspace/${{ github.event.inputs.DEVICE_PATH }}
        cp -r local_tree/* workspace/${{ github.event.inputs.DEVICE_PATH }}/
        
        # Автоматически фиксим Android версию в BoardConfig.mk
        cd workspace/${{ github.event.inputs.DEVICE_PATH }}
        if [ -f BoardConfig.mk ]; then
          echo "Fixing Android version in BoardConfig.mk..."
          sed -i 's/^PLATFORM_VERSION := .*/PLATFORM_VERSION := 13/' BoardConfig.mk
          sed -i 's/^PLATFORM_SECURITY_PATCH := .*/PLATFORM_SECURITY_PATCH := 2025-01-01/' BoardConfig.mk
          echo "Fixed BoardConfig.mk for Android 13"
        fi

    - name: Clone Common Tree (if specified)
      if: |
        github.event.inputs.COMMON_TREE_URL != null 
        && github.event.inputs.COMMON_TREE_URL != ''
        && github.event.inputs.COMMON_PATH != null 
        && github.event.inputs.COMMON_PATH != ''
      run: |
        cd workspace
        git clone --depth=1 ${{ github.event.inputs.COMMON_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.COMMON_PATH }}

    - name: Check Build Tree Type
      id: buildtree
      run: |
        if [[ "${{ github.event.inputs.MANIFEST_BRANCH }}" == *"twrp-11"* ]] || [[ "${{ github.event.inputs.MANIFEST_BRANCH }}" == *"twrp-12"* ]]; then
          echo "tree_type=twrp" >> $GITHUB_OUTPUT
        else
          echo "tree_type=omni" >> $GITHUB_OUTPUT
        fi

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 2  # Уменьшили с 8 до 2GB

    - name: Check Disk Space Before Build
      run: |
        echo "=== Disk Space Before Build ==="
        df -h
        echo "=== Workspace size ==="
        du -sh workspace/ 2>/dev/null || true

    - name: Build Recovery
      run: |
        cd workspace
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        
        source build/envsetup.sh
        
        # Пробуем lunch с userdebug (стандарт для TWRP)
        if lunch ${{ github.event.inputs.MAKEFILE_NAME }}-userdebug; then
          echo "Using userdebug variant"
        else
          # Fallback на eng если userdebug не найден
          lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng
        fi
        
        # Очистка и сборка
        make clean
        mka ${{ github.event.inputs.BUILD_TARGET }}image -j2 2>&1 | tee build.log  # Уменьшили с $(nproc) до 2

    - name: Verify Build Output
      run: |
        cd workspace
        OUTPUT_FILE="out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_TARGET }}.img"
        
        if [ -f "$OUTPUT_FILE" ]; then
          echo "✅ SUCCESS: Recovery image created!"
          ls -lh "$OUTPUT_FILE"
          echo "Size: $(stat -c%s "$OUTPUT_FILE") bytes"
          
          # Копируем для удобной загрузки
          cp "$OUTPUT_FILE" recovery.img
        else
          echo "❌ FAILED: Recovery image not found"
          echo "Searching in out/target/product/${{ github.event.inputs.DEVICE_NAME }}:"
          ls -la "out/target/product/${{ github.event.inputs.DEVICE_NAME }}/" || true
          exit 1
        fi

    - name: Upload to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_number }}
        path: |
          workspace/recovery.img
          workspace/build.log
        retention-days: 30

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        files: workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_TARGET }}.img
        name: "TWRP ${{ github.event.inputs.DEVICE_NAME }} - Build #${{ github.run_number }}"
        tag_name: "build-${{ github.run_number }}"
        body: |
          ### SaluteTV at30a6 TWRP Recovery
          
          **Build Information:**
          - Device: ${{ github.event.inputs.DEVICE_NAME }}
          - Android Version: 13 (TWRP ${{ github.event.inputs.MANIFEST_BRANCH }})
          - Build Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - Build ID: ${{ github.run_id }}
          
          **Build Parameters:**
          - Manifest: ${{ github.event.inputs.MANIFEST_BRANCH }}
          - Device Tree: ${{ github.event.inputs.DEVICE_TREE_URL }}
          - Target: ${{ github.event.inputs.BUILD_TARGET }}.img
          
          **Installation:**
          1. Boot to fastboot mode
          2. `fastboot flash recovery recovery.img`
          3. `fastboot reboot recovery`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
