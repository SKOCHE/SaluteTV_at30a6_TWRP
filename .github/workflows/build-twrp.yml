name: Build TWRP

on:
  workflow_dispatch:
    inputs:
      device_codename:
        description: 'Device codename'
        required: true
        default: 'at30a6'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Clean disk
      run: |
        sudo apt clean
        sudo rm -rf /usr/share/dotnet

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git openjdk-17-jdk python3
        sudo apt install -y gcc-multilib g++-multilib libc6-dev
        sudo apt install -y libxml2-utils xsltproc bc bison flex curl

    - name: Download source
      run: |
        mkdir twrp
        cd twrp
        
        echo "Downloading sources..."
        
        # Build system
        git clone https://github.com/LineageOS/android_build.git build/make -b lineage-20.0 --depth=1
        
        # Recovery - пробуем разные ветки
        git clone https://github.com/TeamWin/android_bootable_recovery.git bootable/recovery --depth=1
        cd bootable/recovery
        # Пробуем переключиться на существующую ветку
        git checkout android-12.1 2>/dev/null || git checkout android-12 2>/dev/null || git checkout twrp-11 2>/dev/null || echo "Using default branch"
        cd ../..
        
        # System core
        git clone https://github.com/LineageOS/android_system_core.git system/core -b lineage-20.0 --depth=1
        
        # Device directory
        mkdir -p device/salute/${{ github.event.inputs.device_codename }}

    - name: Copy device tree
      run: |
        cd twrp/device/salute/${{ github.event.inputs.device_codename }}
        cp $GITHUB_WORKSPACE/*.mk $GITHUB_WORKSPACE/recovery.fstab . 2>/dev/null || true

    - name: Create envsetup.sh
      run: |
        cd twrp/build/make
        echo 'export ALLOW_MISSING_DEPENDENCIES=true' >> core/config.mk
        echo 'export LC_ALL=C' >> core/config.mk

    - name: Try to build
      run: |
        cd twrp/bootable/recovery
        export ALLOW_MISSING_DEPENDENCIES=true
        export TARGET_DEVICE=${{ github.event.inputs.device_codename }}
        
        echo "=== Trying to build ==="
        make -j2 recoveryimage 2>&1 | tail -50 || echo "Build failed"

    - name: Upload if exists
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: recovery-attempt
        path: |
          twrp/out/target/product/${{ github.event.inputs.device_codename }}/recovery.img
          twrp/*.img
