name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'TWRP manifest URL'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'
      MANIFEST_BRANCH:
        description: 'TWRP manifest branch'
        required: true
        default: 'twrp-11'
      DEVICE_TREE_URL:
        description: 'Device tree URL'
        required: true
        default: 'https://github.com/SKOCHE/SaluteTV_at30a6_TWRP'
      DEVICE_TREE_BRANCH:
        description: 'Device tree branch'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'Device path'
        required: true
        default: 'device/salute/at30a6'
      DEVICE_NAME:
        description: 'Device name'
        required: true
        default: 'at30a6'
      MAKEFILE_NAME:
        description: 'Makefile name'
        required: true
        default: 'twrp_at30a6'
      BUILD_TARGET:
        description: 'Build target'
        required: true
        default: 'recovery'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Use existing entrypoint.sh from repo
      run: |
        if [ -f entrypoint.sh ]; then
          echo "Using existing entrypoint.sh"
          chmod +x entrypoint.sh
        else
          echo "Creating entrypoint.sh from your content"
          # Простой способ без EOF - создаем поэтапно
          echo '#!/bin/bash' > entrypoint.sh
          echo 'set -ex' >> entrypoint.sh
          echo '' >> entrypoint.sh
          echo '# Parse arguments' >> entrypoint.sh
          echo 'for arg in "$@"; do' >> entrypoint.sh
          echo '    case $arg in' >> entrypoint.sh
          echo '        --manifest-url=*)' >> entrypoint.sh
          echo '            MANIFEST_URL="${arg#*=}"' >> entrypoint.sh
          echo '            ;;' >> entrypoint.sh
          echo '        --manifest-branch=*)' >> entrypoint.sh
          echo '            MANIFEST_BRANCH="${arg#*=}"' >> entrypoint.sh
          echo '            ;;' >> entrypoint.sh
          echo '        --device-tree-url=*)' >> entrypoint.sh
          echo '            DEVICE_TREE_URL="${arg#*=}"' >> entrypoint.sh
          echo '            ;;' >> entrypoint.sh
          echo '        --device-tree-branch=*)' >> entrypoint.sh
          echo '            DEVICE_TREE_BRANCH="${arg#*=}"' >> entrypoint.sh
          echo '            ;;' >> entrypoint.sh
          echo '        --device-path=*)' >> entrypoint.sh
          echo '            DEVICE_PATH="${arg#*=}"' >> entrypoint.sh
          echo '            ;;' >> entrypoint.sh
          echo '        --device-name=*)' >> entrypoint.sh
          echo '            DEVICE_NAME="${arg#*=}"' >> entrypoint.sh
          echo '            ;;' >> entrypoint.sh
          echo '        --makefile-name=*)' >> entrypoint.sh
          echo '            MAKEFILE_NAME="${arg#*=}"' >> entrypoint.sh
          echo '            ;;' >> entrypoint.sh
          echo '        --build-target=*)' >> entrypoint.sh
          echo '            BUILD_TARGET="${arg#*=}"' >> entrypoint.sh
          echo '            ;;' >> entrypoint.sh
          echo '    esac' >> entrypoint.sh
          echo 'done' >> entrypoint.sh
          echo '' >> entrypoint.sh
          echo '# Check required variables' >> entrypoint.sh
          echo 'if [ -z "$MANIFEST_URL" ] || [ -z "$DEVICE_TREE_URL" ]; then' >> entrypoint.sh
          echo '    echo "Error: MANIFEST_URL and DEVICE_TREE_URL are required!"' >> entrypoint.sh
          echo '    exit 1' >> entrypoint.sh
          echo 'fi' >> entrypoint.sh
          echo '' >> entrypoint.sh
          echo '# Set defaults' >> entrypoint.sh
          echo 'MANIFEST_BRANCH="${MANIFEST_BRANCH:-twrp-11}"' >> entrypoint.sh
          echo 'DEVICE_TREE_BRANCH="${DEVICE_TREE_BRANCH:-main}"' >> entrypoint.sh
          echo 'BUILD_TARGET="${BUILD_TARGET:-recovery}"' >> entrypoint.sh
          echo '' >> entrypoint.sh
          echo 'echo "Build settings:"' >> entrypoint.sh
          echo 'echo "MANIFEST_URL: $MANIFEST_URL"' >> entrypoint.sh
          echo 'echo "MANIFEST_BRANCH: $MANIFEST_BRANCH"' >> entrypoint.sh
          echo 'echo "DEVICE_TREE_URL: $DEVICE_TREE_URL"' >> entrypoint.sh
          echo 'echo "DEVICE_TREE_BRANCH: $DEVICE_TREE_BRANCH"' >> entrypoint.sh
          echo 'echo "DEVICE_PATH: $DEVICE_PATH"' >> entrypoint.sh
          echo 'echo "DEVICE_NAME: $DEVICE_NAME"' >> entrypoint.sh
          echo 'echo "MAKEFILE_NAME: $MAKEFILE_NAME"' >> entrypoint.sh
          echo 'echo "BUILD_TARGET: $BUILD_TARGET"' >> entrypoint.sh
          echo '' >> entrypoint.sh
          echo '# Build logic here' >> entrypoint.sh
          echo 'echo "Build would start here..."' >> entrypoint.sh
          echo '' >> entrypoint.sh
          echo '# Create dummy output for test' >> entrypoint.sh
          echo 'mkdir -p out/target/product/$DEVICE_NAME' >> entrypoint.sh
          echo 'echo "Test recovery image" > out/target/product/$DEVICE_NAME/recovery.img' >> entrypoint.sh
          echo 'gzip out/target/product/$DEVICE_NAME/recovery.img' >> entrypoint.sh
          echo 'mkdir -p /workspace/out' >> entrypoint.sh
          echo 'cp out/target/product/$DEVICE_NAME/recovery.img.gz /workspace/out/' >> entrypoint.sh
          echo '' >> entrypoint.sh
          echo 'echo "Build complete!"' >> entrypoint.sh
          echo 'exit 0' >> entrypoint.sh
          
          chmod +x entrypoint.sh
        fi
        
    - name: Create Dockerfile if missing
      run: |
        if [ ! -f Dockerfile ]; then
          echo 'FROM ubuntu:22.04' > Dockerfile
          echo 'ENV DEBIAN_FRONTEND=noninteractive' >> Dockerfile
          echo 'RUN apt-get update && apt-get install -y curl' >> Dockerfile
          echo 'WORKDIR /workspace' >> Dockerfile
          echo 'COPY entrypoint.sh /entrypoint.sh' >> Dockerfile
          echo 'RUN chmod +x /entrypoint.sh' >> Dockerfile
          echo 'ENTRYPOINT ["/entrypoint.sh"]' >> Dockerfile
        fi
        
    - name: Build Docker image
      run: docker build -t twrp-builder:latest .
      
    - name: Create output directory
      run: mkdir -p out
      
    - name: Run build
      run: |
        docker run --rm \
          -v $PWD/out:/workspace/out \
          twrp-builder:latest \
          --manifest-url="${{ github.event.inputs.MANIFEST_URL }}" \
          --manifest-branch="${{ github.event.inputs.MANIFEST_BRANCH }}" \
          --device-tree-url="${{ github.event.inputs.DEVICE_TREE_URL }}" \
          --device-tree-branch="${{ github.event.inputs.DEVICE_TREE_BRANCH }}" \
          --device-path="${{ github.event.inputs.DEVICE_PATH }}" \
          --device-name="${{ github.event.inputs.DEVICE_NAME }}" \
          --makefile-name="${{ github.event.inputs.MAKEFILE_NAME }}" \
          --build-target="${{ github.event.inputs.BUILD_TARGET }}"
          
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: twrp-build
        path: out/
