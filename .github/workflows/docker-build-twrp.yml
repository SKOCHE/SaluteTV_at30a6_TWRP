name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'TWRP manifest URL'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'
      MANIFEST_BRANCH:
        description: 'TWRP manifest branch'
        required: true
        default: 'twrp-11'
      DEVICE_TREE_URL:
        description: 'Device tree URL'
        required: true
        default: 'https://github.com/SKOCHE/SaluteTV_at30a6_TWRP'
      DEVICE_TREE_BRANCH:
        description: 'Device tree branch'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'Device path'
        required: true
        default: 'device/salute/at30a6'
      DEVICE_NAME:
        description: 'Device name'
        required: true
        default: 'at30a6'
      MAKEFILE_NAME:
        description: 'Makefile name'
        required: true
        default: 'twrp_at30a6'
      BUILD_TARGET:
        description: 'Build target'
        required: true
        default: 'recovery'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Fix line endings in entrypoint.sh
      run: |
        echo "=== FIXING LINE ENDINGS ==="
        # Устанавливаем dos2unix если нет
        sudo apt-get update && sudo apt-get install -y dos2unix
        
        # Проверяем текущие окончания строк
        echo "Проверка до:"
        file entrypoint.sh
        echo "Первые 20 символов:"
        od -c entrypoint.sh | head -3
        
        # Исправляем окончания строк
        dos2unix entrypoint.sh
        
        echo "Проверка после:"
        file entrypoint.sh
        echo "Первые 20 символов:"
        od -c entrypoint.sh | head -3
        
        # Делаем исполняемым
        chmod +x entrypoint.sh
        ls -la entrypoint.sh
        
    - name: Build Docker image
      run: docker build -t twrp-builder:latest .
      
    - name: Test Docker entrypoint
      run: |
        echo "=== TESTING ENTRYPOINT ==="
        # Проверяем, что файл работает
        docker run --rm --entrypoint /bin/bash twrp-builder:latest -c "
          echo '1. Checking file:'
          ls -la /entrypoint.sh
          echo ''
          echo '2. First line:'
          head -1 /entrypoint.sh
          echo ''
          echo '3. File type:'
          file /entrypoint.sh
          echo ''
          echo '4. Line endings (should not show \\r):'
          od -c /entrypoint.sh | head -2
        "
        
    - name: Create output directory
      run: mkdir -p out
      
    - name: Run build
      run: |
        echo "=== STARTING BUILD ==="
        docker run --rm \
          -v $PWD/out:/workspace/out \
          twrp-builder:latest \
          --manifest-url="${{ github.event.inputs.MANIFEST_URL }}" \
          --manifest-branch="${{ github.event.inputs.MANIFEST_BRANCH }}" \
          --device-tree-url="${{ github.event.inputs.DEVICE_TREE_URL }}" \
          --device-tree-branch="${{ github.event.inputs.DEVICE_TREE_BRANCH }}" \
          --device-path="${{ github.event.inputs.DEVICE_PATH }}" \
          --device-name="${{ github.event.inputs.DEVICE_NAME }}" \
          --makefile-name="${{ github.event.inputs.MAKEFILE_NAME }}" \
          --build-target="${{ github.event.inputs.BUILD_TARGET }}"
          
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: twrp-recovery
        path: out/
        retention-days: 7
