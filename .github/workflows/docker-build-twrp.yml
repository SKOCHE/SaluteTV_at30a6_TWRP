name: Recovery Build for SaluteTV AT30A6

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'TWRP manifest URL'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'
      MANIFEST_BRANCH:
        description: 'TWRP manifest branch'
        required: true
        default: 'twrp-11'
      DEVICE_TREE_URL:
        description: 'Device tree repository URL'
        required: true
        default: 'https://github.com/SKOCHE/SaluteTV_at30a6_TWRP'
      DEVICE_TREE_BRANCH:
        description: 'Device tree branch'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'Device path in device tree'
        required: true
        default: 'device/salute/at30a6'
      DEVICE_NAME:
        description: 'Device name'
        required: true
        default: 'at30a6'
      MAKEFILE_NAME:
        description: 'Makefile name'
        required: true
        default: 'twrp_at30a6'
      BUILD_TARGET:
        description: 'Build target'
        required: true
        default: 'recovery'

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Проверка файлов в репозитории
      run: |
        echo "=== СОДЕРЖИМОЕ РЕПОЗИТОРИЯ ==="
        ls -la
        echo ""
        echo "=== ПРОВЕРКА ENTRYPOINT.SH ==="
        ls -la entrypoint.sh
        file entrypoint.sh
        echo ""
        echo "=== ПЕРВЫЕ 10 СТРОК ==="
        head -10 entrypoint.sh
        echo ""
        echo "=== КОНЦЫ СТРОК ==="
        od -c entrypoint.sh | head -20
      
    - name: Create output directory
      run: mkdir -p out
      
    - name: Build Docker Image
      run: |
        echo "=== СБОРКА DOCKER ОБРАЗА ==="
        docker build --no-cache -t my_docker_image:latest .
        
    - name: Проверка Docker образа
      run: |
        echo "=== ПРОВЕРКА ОБРАЗА DOCKER ==="
        # Проверяем, что файл существует
        docker run --rm my_docker_image:latest ls -la /entrypoint.sh
        echo ""
        echo "=== ПРОВЕРКА СОДЕРЖИМОГО ==="
        docker run --rm my_docker_image:latest head -5 /entrypoint.sh
        echo ""
        echo "=== ПРОВЕРКА ИСПОЛНЯЕМОСТИ ==="
        docker run --rm my_docker_image:latest bash -c "[[ -x /entrypoint.sh ]] && echo 'Файл исполняемый' || echo 'Файл НЕ исполняемый'"
        echo ""
        echo "=== ПРОБНЫЙ ЗАПУСК С АРГУМЕНТАМИ ==="
        docker run --rm my_docker_image:latest --help || true
      
    - name: Run Docker Container
      run: |
        echo "=== ЗАПУСК СБОРКИ ==="
        docker run --rm \
          -v $PWD/out:/workspace/out \
          my_docker_image:latest \
          --manifest-url="${{ github.event.inputs.MANIFEST_URL }}" \
          --manifest-branch="${{ github.event.inputs.MANIFEST_BRANCH }}" \
          --device-tree-url="${{ github.event.inputs.DEVICE_TREE_URL }}" \
          --device-tree-branch="${{ github.event.inputs.DEVICE_TREE_BRANCH }}" \
          --device-path="${{ github.event.inputs.DEVICE_PATH }}" \
          --device-name="${{ github.event.inputs.DEVICE_NAME }}" \
          --makefile-name="${{ github.event.inputs.MAKEFILE_NAME }}" \
          --build-target="${{ github.event.inputs.BUILD_TARGET }}"
          
    - name: Проверка выходных файлов
      run: |
        echo "=== ПРОВЕРКА РЕЗУЛЬТАТОВ ==="
        find out -type f -name "*.img*" 2>/dev/null || echo "Файлы не найдены"
        ls -la out/ 2>/dev/null || echo "Директория out не существует"
      
    - name: Archive Build Artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: twrp-recovery
        path: out/
        retention-days: 7
