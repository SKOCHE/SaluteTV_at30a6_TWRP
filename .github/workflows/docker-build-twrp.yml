name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'TWRP manifest URL'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'
      MANIFEST_BRANCH:
        description: 'TWRP manifest branch'
        required: true
        default: 'twrp-11'
      DEVICE_TREE_URL:
        description: 'Device tree URL'
        required: true
        default: 'https://github.com/SKOCHE/SaluteTV_at30a6_TWRP'
      DEVICE_TREE_BRANCH:
        description: 'Device tree branch'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'Device path'
        required: true
        default: 'device/salute/at30a6'
      DEVICE_NAME:
        description: 'Device name'
        required: true
        default: 'at30a6'
      MAKEFILE_NAME:
        description: 'Makefile name'
        required: true
        default: 'twrp_at30a6'
      BUILD_TARGET:
        description: 'Build target'
        required: true
        default: 'recovery'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Fix entrypoint.sh permissions
      run: |
        echo "=== FIXING ENTRYPOINT ==="
        # Убираем Windows окончания строк (CRLF -> LF)
        sed -i 's/\r$//' entrypoint.sh
        # Делаем исполняемым
        chmod +x entrypoint.sh
        # Проверяем
        ls -la entrypoint.sh
        echo "File type:"
        file entrypoint.sh
        
    - name: Build Docker image
      run: |
        echo "=== BUILDING DOCKER IMAGE ==="
        docker build -t twrp-builder:latest .
        
    - name: Test Docker image
      run: |
        echo "=== TESTING DOCKER ==="
        echo "1. File check:"
        docker run --rm --entrypoint /bin/bash twrp-builder:latest -c "ls -la /entrypoint.sh && file /entrypoint.sh"
        echo ""
        echo "2. Test run:"
        docker run --rm twrp-builder:latest --help || echo "Test completed"
        
    - name: Create output directory
      run: mkdir -p out
      
    - name: Run TWRP build
      run: |
        echo "=== RUNNING BUILD ==="
        docker run --rm \
          -v $PWD/out:/workspace/out \
          twrp-builder:latest \
          --manifest-url="${{ github.event.inputs.MANIFEST_URL }}" \
          --manifest-branch="${{ github.event.inputs.MANIFEST_BRANCH }}" \
          --device-tree-url="${{ github.event.inputs.DEVICE_TREE_URL }}" \
          --device-tree-branch="${{ github.event.inputs.DEVICE_TREE_BRANCH }}" \
          --device-path="${{ github.event.inputs.DEVICE_PATH }}" \
          --device-name="${{ github.event.inputs.DEVICE_NAME }}" \
          --makefile-name="${{ github.event.inputs.MAKEFILE_NAME }}" \
          --build-target="${{ github.event.inputs.BUILD_TARGET }}"
          
    - name: Check output
      run: |
        echo "=== CHECKING OUTPUT ==="
        ls -la out/ || echo "No output directory"
        find out -type f 2>/dev/null || echo "No files found"
        
    - name: Upload artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: twrp-recovery
        path: out/
        retention-days: 7
