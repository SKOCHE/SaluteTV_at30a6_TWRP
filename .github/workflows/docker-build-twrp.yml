name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'TWRP manifest URL'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'
      MANIFEST_BRANCH:
        description: 'TWRP manifest branch'
        required: true
        default: 'twrp-11'
      DEVICE_TREE_URL:
        description: 'Device tree URL'
        required: true
        default: 'https://github.com/SKOCHE/SaluteTV_at30a6_TWRP'
      DEVICE_TREE_BRANCH:
        description: 'Device tree branch'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'Device path'
        required: true
        default: 'device/salute/at30a6'
      DEVICE_NAME:
        description: 'Device name'
        required: true
        default: 'at30a6'
      MAKEFILE_NAME:
        description: 'Makefile name'
        required: true
        default: 'twrp_at30a6'
      BUILD_TARGET:
        description: 'Build target'
        required: true
        default: 'recovery'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check disk space before
      run: df -h
      
    - name: Clean up disk space
      run: |
        echo "=== CLEANING DISK SPACE ==="
        # Очищаем кэш
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/.ghcup
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        docker system prune -a -f || true
        echo "After cleanup:"
        df -h
        
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Fix entrypoint.sh
      run: |
        chmod +x entrypoint.sh
        sed -i 's/\r$//' entrypoint.sh || true
        
    - name: Build minimal Docker image
      run: |
        echo "=== BUILDING MINIMAL DOCKER IMAGE ==="
        cat > Dockerfile << 'EOF'
FROM ubuntu:22.04
ENV DEBIAN_FRONTEND=noninteractive
RUN apt-get update && apt-get install -y --no-install-recommends \
    git curl python3 openjdk-8-jdk ca-certificates \
    && apt-get clean && rm -rf /var/lib/apt/lists/*
RUN curl -s https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo \
    && chmod a+x /usr/local/bin/repo
WORKDIR /workspace
COPY entrypoint.sh /entrypoint.sh
RUN chmod +x /entrypoint.sh
ENTRYPOINT ["/bin/bash", "/entrypoint.sh"]
EOF
        
        docker build -t twrp-builder:latest .
        
    - name: Check disk space after Docker build
      run: df -h
      
    - name: Run test build
      run: |
        echo "=== RUNNING TEST BUILD ==="
        mkdir -p out
        docker run --rm \
          -v $PWD/out:/workspace/out \
          twrp-builder:latest \
          --manifest-url="${{ github.event.inputs.MANIFEST_URL }}" \
          --manifest-branch="${{ github.event.inputs.MANIFEST_BRANCH }}" \
          --device-tree-url="${{ github.event.inputs.DEVICE_TREE_URL }}" \
          --device-tree-branch="${{ github.event.inputs.DEVICE_TREE_BRANCH }}" \
          --device-path="${{ github.event.inputs.DEVICE_PATH }}" \
          --device-name="${{ github.event.inputs.DEVICE_NAME }}" \
          --makefile-name="${{ github.event.inputs.MAKEFILE_NAME }}" \
          --build-target="${{ github.event.inputs.BUILD_TARGET }}"
          
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: twrp-recovery
        path: out/
        retention-days: 7
